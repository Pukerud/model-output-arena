<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js Thriller Dance - Cinematic Cemetery</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #05050d;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }
    .ui-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      color: rgba(255, 255, 255, 0.85);
      z-index: 10;
      pointer-events: none;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
    }
    .ui-overlay h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 5px;
      color: #7c3aed; /* Purple theme */
    }
    .ui-overlay p {
      font-size: 13px;
      color: #94a3b8;
    }
    .controls {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      padding: 10px 24px;
      display: flex;
      gap: 15px;
      align-items: center;
      z-index: 10;
    }
    .btn {
      background: none;
      border: none;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 15px;
      transition: background 0.2s;
    }
    .btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .btn.active {
      background: #7c3aed;
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="ui-overlay">
    <h1>Cemetery Thriller Matchup</h1>
    <p>MJ &bull; Pepe &bull; Trump &bull; Elon &bull; Gemini 3.5 Flash</p>
  </div>

  <div class="controls">
    <button class="btn active" id="btn-cam" onclick="toggleCameraAuto()">Camera Auto</button>
    <button class="btn" id="btn-spot" onclick="toggleSpotlightColor()">Change Lights</button>
    <button class="btn" onclick="triggerGlowEyes()">Rage Mode</button>
  </div>

  <div id="canvas-container"></div>

  <!-- Three.js and OrbitControls CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    // General variables
    let scene, camera, renderer, controls;
    let characters = [];
    let spotlight, spotlightHelper;
    let masterTime = 0;
    let autoCamera = true;
    let glowEyesActive = false;
    let eyeLights = [];

    // Colors list
    const spotColors = [0x7c3aed, 0x10b981, 0xef4444, 0x06b6d4, 0xf59e0b];
    let currentColorIndex = 0;

    function init() {
      const container = document.getElementById('canvas-container');

      // 1. Scene setup
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x05050d);
      scene.fog = new THREE.FogExp2(0x070716, 0.045);

      // 2. Camera setup
      camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 100);
      camera.position.set(0, 5, 15);

      // 3. Renderer setup
      renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      container.appendChild(renderer.domElement);

      // 4. Orbit Controls
      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground
      controls.minDistance = 5;
      controls.maxDistance = 35;

      // 5. Environmental Lighting
      const ambientLight = new THREE.AmbientLight(0x0f1126, 0.6);
      scene.add(ambientLight);

      // Directional moonlight casting shadows
      const moonLight = new THREE.DirectionalLight(0x768ad1, 0.8);
      moonLight.position.set(10, 20, -10);
      moonLight.castShadow = true;
      moonLight.shadow.mapSize.width = 1024;
      moonLight.shadow.mapSize.height = 1024;
      moonLight.shadow.bias = -0.001;
      scene.add(moonLight);

      // Spotlights for dramatic staging
      spotlight = new THREE.SpotLight(0x7c3aed, 5, 25, Math.PI / 4, 0.5, 1);
      spotlight.position.set(0, 12, 4);
      spotlight.target.position.set(0, 0, 0);
      spotlight.castShadow = true;
      scene.add(spotlight);
      scene.add(spotlight.target);

      // 6. Ground Cemetery setup
      createGround();
      createScenery();

      // 7. Create custom stylized characters
      createCharacters();

      // Adjust camera target
      controls.target.set(0, 1.8, 0);

      window.addEventListener('resize', onWindowResize);
      animate(0);
    }

    function createGround() {
      const geometry = new THREE.PlaneGeometry(60, 60);
      
      // Procedural grass texture
      const canvasTexture = document.createElement('canvas');
      canvasTexture.width = 256;
      canvasTexture.height = 256;
      const c = canvasTexture.getContext('2d');
      c.fillStyle = '#111422';
      c.fillRect(0,0,256,256);
      // Add green/brown specs
      for(let i=0; i<3000; i++) {
        c.fillStyle = Math.random() > 0.4 ? '#14271c' : '#0a0d14';
        c.fillRect(Math.random()*256, Math.random()*256, 3, 3);
      }
      const texture = new THREE.CanvasTexture(canvasTexture);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(6, 6);

      const material = new THREE.MeshStandardMaterial({
        map: texture,
        roughness: 0.8,
        metalness: 0.1
      });

      const ground = new THREE.Mesh(geometry, material);
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);
    }

    function createScenery() {
      // Add spooky gravestones
      const stoneGeo = new THREE.BoxGeometry(0.8, 1.4, 0.3);
      const stoneMat = new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.9 });

      // Placed around the background/sides
      const stonePositions = [
        [-5, 0, -4], [-8, 0, -1], [4, 0, -5], [7, 0, -2],
        [-11, 0, 3], [10, 0, 5], [-6, 0, 8], [6, 0, 7]
      ];

      stonePositions.forEach(([x, y, z]) => {
        const stone = new THREE.Mesh(stoneGeo, stoneMat);
        stone.position.set(x, 0.7, z);
        stone.rotation.y = (Math.random() - 0.5) * 0.4;
        stone.rotation.x = (Math.random() - 0.5) * 0.15; // slightly crooked
        stone.castShadow = true;
        stone.receiveShadow = true;
        scene.add(stone);

        // Subtly lit cross on gravestone
        const crossH = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.05), stoneMat);
        crossH.position.set(x, 1.0, z + 0.16);
        scene.add(crossH);
        const crossV = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.5, 0.05), stoneMat);
        crossV.position.set(x, 1.05, z + 0.16);
        scene.add(crossV);
      });

      // Spooky trees
      for(let i=0; i<6; i++) {
        const treeGroup = new THREE.Group();
        const trunkGeo = new THREE.CylinderGeometry(0.15, 0.3, 4, 8);
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.9 });
        const trunk = new THREE.Mesh(trunkGeo, trunkMat);
        trunk.position.y = 2;
        trunk.castShadow = true;
        treeGroup.add(trunk);

        // Branch clusters
        const branchGeo = new THREE.DodecahedronGeometry(1.2, 0);
        const branchMat = new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.95 });
        const branch1 = new THREE.Mesh(branchGeo, branchMat);
        branch1.position.set(0, 3.8, 0);
        branch1.castShadow = true;
        treeGroup.add(branch1);

        const angle = i * Math.PI / 3 + Math.random()*0.2;
        const radius = 15 + Math.random()*5;
        treeGroup.position.set(Math.cos(angle)*radius, 0, Math.sin(angle)*radius);
        scene.add(treeGroup);
      }

      // Add a huge distant glowing moon
      const moonGeo = new THREE.SphereGeometry(6, 16, 16);
      const moonMat = new THREE.MeshBasicMaterial({ color: 0xe0e7ff });
      const moon = new THREE.Mesh(moonGeo, moonMat);
      moon.position.set(15, 20, -45);
      scene.add(moon);
    }

    // Helper: Material creators
    function makeMat(color, roughness = 0.5) {
      return new THREE.MeshStandardMaterial({ color: color, roughness: roughness });
    }

    // Creating Hierarchical Characters
    function createCharacters() {
      // Michael Jackson
      const mj = buildHumanoid({
        jacketColor: 0xd91616, // Red
        pantColor: 0x111111,   // Dark
        skinColor: 0xffe0bd,
        hasHat: true,
        gloveHand: 'right',
        name: 'michael'
      });
      mj.position.set(-3, 0, 0);
      scene.add(mj);
      characters.push({ mesh: mj, type: 'michael' });

      // Pepe the Frog
      const pepe = buildPepe();
      pepe.position.set(-1, 0, 0);
      scene.add(pepe);
      characters.push({ mesh: pepe, type: 'pepe' });

      // Donald Trump
      const trump = buildHumanoid({
        jacketColor: 0x1b2755, // Blue suit
        pantColor: 0x1b2755,
        skinColor: 0xfdbf6f, // Orange-ish skin
        hairColor: 0xfacc15, // Bright yellow swept hair
        tieColor: 0xef4444,
        name: 'trump'
      });
      trump.position.set(1, 0, 0);
      scene.add(trump);
      characters.push({ mesh: trump, type: 'trump' });

      // Elon Musk
      const elon = buildHumanoid({
        jacketColor: 0x222222, // Black space shirt
        pantColor: 0x475569, // Grey pants
        skinColor: 0xffdbac,
        hairColor: 0x453123,
        logo: true,
        name: 'elon'
      });
      elon.position.set(3, 0, 0);
      scene.add(elon);
      characters.push({ mesh: elon, type: 'elon' });
    }

    // Generic humanoid builder (for MJ, Trump, Elon)
    function buildHumanoid(cfg) {
      const group = new THREE.Group();

      // Materials
      const clothMat = makeMat(cfg.jacketColor, 0.4);
      const pantMat = makeMat(cfg.pantColor, 0.5);
      const skinMat = makeMat(cfg.skinColor, 0.3);
      const hairMat = cfg.hairColor ? makeMat(cfg.hairColor, 0.7) : null;

      // Torso
      const torsoGeo = new THREE.CylinderGeometry(0.4, 0.3, 1.2, 8);
      const torso = new THREE.Mesh(torsoGeo, clothMat);
      torso.position.y = 1.9;
      torso.castShadow = true;
      group.add(torso);

      // Neck + Head
      const neckGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.2, 8);
      const neck = new THREE.Mesh(neckGeo, skinMat);
      neck.position.y = 2.6;
      group.add(neck);

      const headGeo = new THREE.SphereGeometry(0.3, 12, 12);
      const head = new THREE.Mesh(headGeo, skinMat);
      head.position.y = 2.95;
      head.castShadow = true;
      group.add(head);
      group.userData.head = head;

      // Red Eyes for Rage Mode
      const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
      leftEye.position.set(-0.1, 3.0, 0.23);
      leftEye.visible = false;
      group.add(leftEye);
      eyeLights.push(leftEye);

      const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
      rightEye.position.set(0.1, 3.0, 0.23);
      rightEye.visible = false;
      group.add(rightEye);
      eyeLights.push(rightEye);

      // Distinct elements
      if (cfg.hasHat) {
        // Fedor hat (MJ)
        const rimGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.02, 16);
        const rim = new THREE.Mesh(rimGeo, makeMat(0x111111));
        rim.position.y = 3.25;
        group.add(rim);

        const capGeo = new THREE.CylinderGeometry(0.28, 0.3, 0.25, 16);
        const cap = new THREE.Mesh(capGeo, makeMat(0x111111));
        cap.position.y = 3.38;
        group.add(cap);
      }

      if (cfg.name === 'trump') {
        // Red tie
        const tieGeo = new THREE.BoxGeometry(0.08, 0.5, 0.02);
        const tie = new THREE.Mesh(tieGeo, makeMat(0xef4444));
        tie.position.set(0, 2.1, 0.31);
        group.add(tie);

        // Sweeping yellow hair
        const hairGeo = new THREE.BoxGeometry(0.5, 0.2, 0.55);
        const hair = new THREE.Mesh(hairGeo, hairMat);
        hair.position.set(0, 3.25, -0.05);
        group.add(hair);
      }

      if (cfg.name === 'elon') {
        // Elon hair
        const hairGeo = new THREE.BoxGeometry(0.48, 0.15, 0.5);
        const hair = new THREE.Mesh(hairGeo, hairMat);
        hair.position.set(0, 3.22, -0.02);
        group.add(hair);
      }

      // Left Arm
      const leftArmGroup = new THREE.Group();
      leftArmGroup.position.set(-0.55, 2.3, 0);
      const leftUpperArmGeo = new THREE.CylinderGeometry(0.12, 0.1, 0.8, 8);
      const leftUpperArm = new THREE.Mesh(leftUpperArmGeo, clothMat);
      leftUpperArm.position.y = -0.3;
      leftUpperArm.castShadow = true;
      leftArmGroup.add(leftUpperArm);
      
      const leftHandGeo = new THREE.SphereGeometry(0.09, 8, 8);
      const leftHand = new THREE.Mesh(leftHandGeo, (cfg.gloveHand === 'left') ? makeMat(0xffffff) : skinMat);
      leftHand.position.y = -0.75;
      leftArmGroup.add(leftHand);
      group.add(leftArmGroup);
      group.userData.leftArm = leftArmGroup;

      // Right Arm
      const rightArmGroup = new THREE.Group();
      rightArmGroup.position.set(0.55, 2.3, 0);
      const rightUpperArmGeo = new THREE.CylinderGeometry(0.12, 0.1, 0.8, 8);
      const rightUpperArm = new THREE.Mesh(rightUpperArmGeo, clothMat);
      rightUpperArm.position.y = -0.3;
      rightUpperArm.castShadow = true;
      rightArmGroup.add(rightUpperArm);
      
      const rightHandGeo = new THREE.SphereGeometry(0.09, 8, 8);
      const rightHand = new THREE.Mesh(rightHandGeo, (cfg.gloveHand === 'right') ? makeMat(0xffffff) : skinMat);
      rightHand.position.y = -0.75;
      rightArmGroup.add(rightHand);
      group.add(rightArmGroup);
      group.userData.rightArm = rightArmGroup;

      // Left Leg
      const leftLegGroup = new THREE.Group();
      leftLegGroup.position.set(-0.25, 1.3, 0);
      const leftLegGeo = new THREE.CylinderGeometry(0.15, 0.12, 1.3, 8);
      const leftLeg = new THREE.Mesh(leftLegGeo, pantMat);
      leftLeg.position.y = -0.6;
      leftLeg.castShadow = true;
      leftLegGroup.add(leftLeg);
      
      const leftBootGeo = new THREE.BoxGeometry(0.18, 0.15, 0.35);
      const leftBoot = new THREE.Mesh(leftBootGeo, makeMat(0x111111));
      leftBoot.position.set(0, -1.25, 0.06);
      leftLegGroup.add(leftBoot);
      group.add(leftLegGroup);
      group.userData.leftLeg = leftLegGroup;

      // Right Leg
      const rightLegGroup = new THREE.Group();
      rightLegGroup.position.set(0.25, 1.3, 0);
      const rightLegGeo = new THREE.CylinderGeometry(0.15, 0.12, 1.3, 8);
      const rightLeg = new THREE.Mesh(rightLegGeo, pantMat);
      rightLeg.position.y = -0.6;
      rightLeg.castShadow = true;
      rightLegGroup.add(rightLeg);
      
      const rightBootGeo = new THREE.BoxGeometry(0.18, 0.15, 0.35);
      const rightBoot = new THREE.Mesh(rightBootGeo, makeMat(0x111111));
      rightBoot.position.set(0, -1.25, 0.06);
      rightLegGroup.add(rightBoot);
      group.add(rightLegGroup);
      group.userData.rightLeg = rightLegGroup;

      return group;
    }

    // Pepe frog builder
    function buildPepe() {
      const group = new THREE.Group();
      const greenMat = makeMat(0x1e3a1e, 0.4); // Pepe green skin
      const blueMat = makeMat(0x1d4ed8, 0.4);  // Blue shirt
      const brownMat = makeMat(0x78350f, 0.5); // Brown pants

      // Torso (Shirt)
      const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.4, 1.1, 8), blueMat);
      torso.position.y = 1.8;
      torso.castShadow = true;
      group.add(torso);

      // Frog Head
      const headGroup = new THREE.Group();
      headGroup.position.y = 2.75;
      
      const face = new THREE.Mesh(new THREE.SphereGeometry(0.38, 12, 12), greenMat);
      headGroup.add(face);

      // Large Bulging Eyes (Pepe signature)
      const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.13, 8, 8), makeMat(0xffffff));
      eyeL.position.set(-0.16, 0.25, 0.2);
      headGroup.add(eyeL);
      const pupilL = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), makeMat(0x000000));
      pupilL.position.set(-0.16, 0.25, 0.31);
      headGroup.add(pupilL);

      const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.13, 8, 8), makeMat(0xffffff));
      eyeR.position.set(0.16, 0.25, 0.2);
      headGroup.add(eyeR);
      const pupilR = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), makeMat(0x000000));
      pupilR.position.set(0.16, 0.25, 0.31);
      headGroup.add(pupilR);

      // Red Eyes for rage mode
      const rageEyeL = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
      rageEyeL.position.set(-0.16, 0.25, 0.32);
      rageEyeL.visible = false;
      headGroup.add(rageEyeL);
      eyeLights.push(rageEyeL);

      const rageEyeR = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
      rageEyeR.position.set(0.16, 0.25, 0.32);
      rageEyeR.visible = false;
      headGroup.add(rageEyeR);
      eyeLights.push(rageEyeR);

      // Lips
      const lipU = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.08, 0.15), greenMat);
      lipU.position.set(0, -0.12, 0.28);
      headGroup.add(lipU);

      group.add(headGroup);
      group.userData.head = headGroup;

      // Arms
      const leftArm = new THREE.Group();
      leftArm.position.set(-0.6, 2.1, 0);
      const upperL = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.09, 0.7, 8), blueMat);
      upperL.position.y = -0.3;
      leftArm.add(upperL);
      const handL = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), greenMat);
      handL.position.y = -0.65;
      leftArm.add(handL);
      group.add(leftArm);
      group.userData.leftArm = leftArm;

      const rightArm = new THREE.Group();
      rightArm.position.set(0.6, 2.1, 0);
      const upperR = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.09, 0.7, 8), blueMat);
      upperR.position.y = -0.3;
      rightArm.add(upperR);
      const handR = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), greenMat);
      handR.position.y = -0.65;
      rightArm.add(handR);
      group.add(rightArm);
      group.userData.rightArm = rightArm;

      // Legs
      const leftLeg = new THREE.Group();
      leftLeg.position.set(-0.25, 1.2, 0);
      const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.11, 1.2, 8), brownMat);
      legL.position.y = -0.55;
      leftLeg.add(legL);
      const footL = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.12, 0.35), greenMat);
      footL.position.set(0, -1.15, 0.08);
      leftLeg.add(footL);
      group.add(leftLeg);
      group.userData.leftLeg = leftLeg;

      const rightLeg = new THREE.Group();
      rightLeg.position.set(0.25, 1.2, 0);
      const legR = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.11, 1.2, 8), brownMat);
      legR.position.y = -0.55;
      rightLeg.add(legR);
      const footR = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.12, 0.35), greenMat);
      footR.position.set(0, -1.15, 0.08);
      rightLeg.add(footR);
      group.add(rightLeg);
      group.userData.rightLeg = rightLeg;

      return group;
    }

    // Dynamic Choreography (Thriller Routine)
    function animateDance(char, time, type) {
      const m = char.mesh;
      const t = time * 3.5; // speed scale

      // Identify phase of dance (swapping every 8 seconds)
      const phase = Math.floor(time / 6) % 3;

      // Reset base position slightly
      m.position.y = 0;

      // Choreography phases
      if (phase === 0) {
        // --- Phase 1: Zombie Shuffle walk ---
        // Slouch torso slightly forward
        m.rotation.x = 0.2 + Math.sin(t) * 0.05;
        m.rotation.z = Math.sin(t * 0.5) * 0.05;

        // Head bobbing sideways
        m.userData.head.rotation.y = Math.sin(t) * 0.2;
        m.userData.head.rotation.z = Math.cos(t) * 0.15;

        // Arms straight forward zombie style
        m.userData.leftArm.rotation.x = -Math.PI / 2 + Math.sin(t) * 0.1;
        m.userData.leftArm.rotation.y = -0.2;
        m.userData.rightArm.rotation.x = -Math.PI / 2 - Math.sin(t) * 0.1;
        m.userData.rightArm.rotation.y = 0.2;

        // Legs alternate walking dragging
        m.userData.leftLeg.rotation.x = Math.sin(t * 0.5) * 0.3;
        m.userData.rightLeg.rotation.x = -Math.sin(t * 0.5) * 0.2;

        // Sync coordinates movement (walking in place drag)
        m.position.z = Math.sin(t * 0.5) * 0.15;

      } else if (phase === 1) {
        // --- Phase 2: Claw hands claws up (iconic MJ thriller) ---
        m.rotation.x = 0.1;
        m.rotation.z = Math.sin(t * 1.5) * 0.05;

        // Head looking left then snapping right
        const snap = Math.floor(t / Math.PI) % 2;
        m.userData.head.rotation.y = snap === 0 ? -0.4 : 0.4;
        m.userData.head.rotation.z = 0;

        // Arms bent at elbows pointing up like claws
        m.userData.leftArm.rotation.x = -Math.PI * 0.7 + Math.sin(t) * 0.15;
        m.userData.leftArm.rotation.z = -0.4 + Math.sin(t * 2) * 0.1;
        
        m.userData.rightArm.rotation.x = -Math.PI * 0.7 - Math.sin(t) * 0.15;
        m.userData.rightArm.rotation.z = 0.4 + Math.sin(t * 2) * 0.1;

        // Feet bouncing knees bending
        const bounce = Math.abs(Math.sin(t)) * 0.18;
        m.position.y = -bounce;
        
        m.userData.leftLeg.rotation.x = -bounce;
        m.userData.rightLeg.rotation.x = -bounce;

      } else if (phase === 2) {
        // --- Phase 3: Head side tilt hip sway (Thriller climax) ---
        m.rotation.x = 0.0;
        
        // Hip sway
        m.position.x = (type === 'michael' ? -3 : (type === 'pepe' ? -1 : (type === 'trump' ? 1 : 3))) + Math.sin(t) * 0.4;

        // Head leaning heavily left/right
        m.userData.head.rotation.z = Math.sin(t) * 0.45;
        m.userData.head.rotation.y = Math.cos(t) * 0.2;

        // Hands pumping down at waist
        m.userData.leftArm.rotation.x = 0.3 + Math.sin(t) * 0.2;
        m.userData.leftArm.rotation.y = -0.3;
        m.userData.rightArm.rotation.x = 0.3 - Math.sin(t) * 0.2;
        m.userData.rightArm.rotation.y = 0.3;

        // Sync legs bending sideways
        m.userData.leftLeg.rotation.z = Math.sin(t) * 0.15;
        m.userData.rightLeg.rotation.z = Math.sin(t) * 0.15;
      }
    }

    // Interactive UI controls implementation
    function toggleCameraAuto() {
      autoCamera = !autoCamera;
      const btn = document.getElementById('btn-cam');
      if (autoCamera) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    }

    function toggleSpotlightColor() {
      currentColorIndex = (currentColorIndex + 1) % spotColors.length;
      spotlight.color.setHex(spotColors[currentColorIndex]);
    }

    function triggerGlowEyes() {
      glowEyesActive = !glowEyesActive;
      eyeLights.forEach(e => {
        e.visible = glowEyesActive;
      });
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Animation & rendering
    function animate(time) {
      requestAnimationFrame(animate);

      const delta = (time / 1000);
      masterTime = delta;

      // Update Controls
      controls.update();

      // Camera auto-orbit loop
      if (autoCamera) {
        camera.position.x = Math.sin(delta * 0.15) * 16;
        camera.position.z = Math.cos(delta * 0.15) * 16;
        camera.position.y = 4.5 + Math.sin(delta * 0.3) * 2;
      }

      // Dynamic light sweeps
      spotlight.position.x = Math.sin(delta * 1.5) * 6;
      spotlight.position.z = 4 + Math.cos(delta * 1.1) * 3;

      // Animate dance choreography for all characters
      characters.forEach(char => {
        animateDance(char, delta, char.type);
      });

      renderer.render(scene, camera);
    }

    // Run setup
    init();

  </script>
</body>
