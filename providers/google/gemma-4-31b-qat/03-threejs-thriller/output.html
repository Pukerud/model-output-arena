<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thriller Night - Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui {
            position: absolute;
            top: 20px; left: 20px;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 2px 2px #ff0000;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>THRILLER NIGHT</h1>
        <p>Featuring: MJ, Pepe, Trump & Musk</p>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls;
        const characters = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.FogExp2(0x050510, 0.02);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Ground
            const groundGeo = new THREE.PlaneGeometry(100, 100);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);

            const spotlight = new THREE.SpotLight(0xffffff, 100);
            spotlight.position.set(0, 20, 0);
            spotlight.castShadow = true;
            spotlight.angle = Math.PI / 4;
            spotlight.penumbra = 0.2;
            scene.add(spotlight);

            const rimLight = new THREE.PointLight(0x3300ff, 50);
            rimLight.position.set(-10, 5, -10);
            scene.add(rimLight);

            // Characters
            const charConfigs = [
                { name: 'MJ', color: 0xff0000, pos: [-3, 0, 0], scale: 1 },
                { name: 'Pepe', color: 0x00ff00, pos: [0, 0, 0], scale: 0.8 },
                { name: 'Trump', color: 0xffccaa, pos: [3, 0, 0], scale: 1.1 },
                { name: 'Musk', color: 0xaaaaaa, pos: [6, 0, 0], scale: 1 }
            ];

            charConfigs.forEach(cfg => {
                const group = new THREE.Group();
                
                // Head
                const head = new THREE.Mesh(
                    new THREE.BoxGeometry(0.5, 0.5, 0.5),
                    new THREE.MeshStandardMaterial({ color: cfg.color })
                );
                head.position.y = 1.6;
                head.castShadow = true;
                group.add(head);

                // Body
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 1, 0.4),
                    new THREE.MeshStandardMaterial({ color: 0x333333 })
                );
                body.position.y = 1;
                body.castShadow = true;
                group.add(body);

                // Arms
                const armL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), new THREE.MeshStandardMaterial({ color: cfg.color }));
                armL.position.set(-0.5, 1, 0);
                group.add(armL);

                const armR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), new THREE.MeshStandardMaterial({ color: cfg.color }));
                armR.position.set(0.5, 1, 0);
                group.add(armR);

                // Legs
                const legL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                legL.position.set(-0.2, 0.4, 0);
                group.add(legL);

                const legR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                legR.position.set(0.2, 0.4, 0);
                group.add(legR);

                group.position.set(...cfg.pos);
                group.scale.setScalar(cfg.scale);
                scene.add(group);
                characters.push({ mesh: group, armL, armR, legL, legR, head, offset: Math.random() * Math.PI });
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.002;

            characters.forEach((char, i) => {
                const t = time + char.offset;
                
                // Thriller-like dance movement
                char.mesh.position.y = Math.abs(Math.sin(t)) * 0.2;
                char.mesh.rotation.y = Math.sin(t * 0.5) * 0.1;
                
                // Arm movement
                char.armL.rotation.z = Math.sin(t) * 0.8 + 0.5;
                char.armR.rotation.z = -Math.sin(t) * 0.8 - 0.5;
                char.armL.rotation.x = Math.cos(t) * 0.5;
                char.armR.rotation.x = Math.cos(t) * 0.5;
                
                // Leg movement
                char.legL.rotation.x = Math.sin(t) * 0.3;
                char.legR.rotation.x = -Math.sin(t) * 0.3;
                
                // Head bob
                char.head.rotation.x = Math.sin(t * 2) * 0.1;
            });

            // Camera slight movement for cinematic effect
            camera.position.x = Math.sin(time * 0.1) * 2;

            controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
