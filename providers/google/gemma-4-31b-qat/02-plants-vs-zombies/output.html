<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plants vs Zombies: Mini Edition</title>
    <style>
        :root {
            --grass-light: #5d9e3d;
            --grass-dark: #4a7c2f;
            --ui-bg: #7d5a3b;
            --ui-text: #fefefe;
            --sun-color: #ffd700;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #222;
            color: var(--ui-text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 960px;
            height: 600px;
            background: #4CAF50;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        #ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 180px;
            background: var(--ui-bg);
            border: 4px solid #5d3a22;
            border-radius: 10px;
            padding: 10px;
            z-index: 100;
        }
        .stat {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
            text-shadow: 1px 1px #000;
        }
        #sun-counter {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            padding: 5px;
            border-radius: 5px;
        }
        .sun-icon {
            width: 20px;
            height: 20px;
            background: var(--sun-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--sun-color);
        }
        #seed-bank {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }
        .seed {
            background: #a67c52;
            border: 2px solid #5d3a22;
            border-radius: 5px;
            padding: 5px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
        }
        .seed:hover { transform: scale(1.05); }
        .seed.selected { border-color: #fff; box-shadow: 0 0 10px #fff; }
        .seed.disabled { opacity: 0.5; cursor: not-allowed; }
        .seed-cost {
            position: absolute;
            bottom: 2px;
            right: 2px;
            font-size: 12px;
            background: #333;
            padding: 0 3px;
            border-radius: 3px;
        }
        .seed-name { font-size: 11px; font-weight: bold; }
        
        #grid {
            display: grid;
            grid-template-columns: repeat(9, 106.6px);
            grid-template-rows: repeat(5, 120px);
            width: 100%;
            height: 100%;
            transform: translateY(60px);
        }
        .cell {
            width: 106.6px;
            height: 120px;
            box-sizing: border-box;
            border: 1px solid rgba(0,0,0,0.1);
            position: relative;
        }
        .cell:nth-child(even) { background: var(--grass-light); }
        .cell:nth-child(odd) { background: var(--grass-dark); }
        .cell:hover { background: rgba(255,255,255,0.2); cursor: crosshair; }

        .entity {
            position: absolute;
            width: 60px;
            height: 60px;
            margin: 30px 23px;
            transition: transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border-radius: 50%;
            text-align: center;
            font-size: 12px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        .plant { background: #4CAF50; color: white; border: 3px solid #2e7d32; }
        .zombie { background: #8d6e63; color: #222; border: 3px solid #5d4037; transition: left 0.1s linear; }
        .projectile {
            position: absolute;
            width: 15px;
            height: 15px;
            background: #ccff00;
            border-radius: 50%;
            box-shadow: 0 0 5px #ccff00;
            z-index: 50;
        }
        .sun {
            position: absolute;
            width: 40px;
            height: 40px;
            background: var(--sun-color);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--sun-color);
            cursor: pointer;
            z-index: 80;
            animation: rotateSun 3s linear infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }
        @keyframes rotateSun {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none;
        }
        #overlay h1 { font-size: 48px; margin-bottom: 20px; }
        .btn {
            background: var(--ui-bg);
            color: white;
            border: 3px solid #5d3a22;
            padding: 10px 30px;
            font-size: 24px;
            cursor: pointer;
            border-radius: 10px;
        }
        .btn:hover { background: #a67c52; }

        #leaderboard {
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            width: 300px;
        }
        .lb-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui-panel">
            <div id="sun-counter">
                <div class="sun-icon"></div>
                <span id="sun-val">50</span>
            </div>
            <div id="seed-bank">
                <!-- Seeds will be injected here -->
            </div>
        </div>
        <div id="grid"></div>
        <div id="overlay">
            <h1 id="overlay-title">Game Over</h1>
            <div id="leaderboard">
                <h3>Leaderboard</h3>
                <div id="lb-content"></div>
            </div>
            <button class="btn" onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            rows: 5,
            cols: 9,
            sunSpawnRate: 5000,
            zombieSpawnRate: 10000,
            plants: {
                peashooter: { cost: 100, hp: 100, damage: 20, rate: 2000, color: '#4CAF50', name: 'Pea' },
                sunflower: { cost: 50, hp: 100, produceSun: 25, rate: 8000, color: '#FFEB3B', name: 'Sun' },
                wallnut: { cost: 50, hp: 400, damage: 0, rate: 0, color: '#A1887F', name: 'Nut' }
            },
            zombies: {
                basic: { hp: 100, speed: 0.5, damage: 1, color: '#8d6e63', name: 'Zombie' },
                fast: { hp: 60, speed: 1.2, damage: 1, color: '#bcaaa4', name: 'Runner' }
            }
        };

        let state = {
            sun: 50,
            selectedPlant: null,
            plants: [],
            zombies: [],
            projectiles: [],
            score: 0,
            gameActive: true,
            difficulty: 1
        };

        const gridEl = document.getElementById('grid');
        const sunValEl = document.getElementById('sun-val');
        const seedBankEl = document.getElementById('seed-bank');
        const overlayEl = document.getElementById('overlay');

        function init() {
            // Grid
            for (let r = 0; r < CONFIG.rows; r++) {
                for (let c = 0; c < CONFIG.cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.onclick = () => placePlant(r, c);
                    gridEl.appendChild(cell);
                }
            }

            // Seed bank
            for (const [id, p] of Object.entries(CONFIG.plants)) {
                const seed = document.createElement('div');
                seed.className = 'seed';
                seed.id = `seed-${id}`;
                seed.innerHTML = `<div class="seed-name">${p.name}</div><div class="seed-cost">${p.cost}</div>`;
                seed.onclick = () => selectPlant(id);
                seedBankEl.appendChild(seed);
            }

            setInterval(spawnSun, CONFIG.sunSpawnRate);
            gameLoop();
        }

        function selectPlant(id) {
            if (state.selectedPlant === id) {
                state.selectedPlant = null;
            } else {
                state.selectedPlant = id;
            }
            updateUI();
        }

        function updateUI() {
            sunValEl.innerText = state.sun;
            document.querySelectorAll('.seed').forEach(s => {
                const id = s.id.replace('seed-', '');
                s.classList.toggle('selected', state.selectedPlant === id);
                s.classList.toggle('disabled', state.sun < CONFIG.plants[id].cost);
            });
        }

        function placePlant(r, c) {
            if (!state.selectedPlant || !state.gameActive) return;
            
            const plantCfg = CONFIG.plants[state.selectedPlant];
            if (state.sun < plantCfg.cost) return;

            const existing = state.plants.find(p => p.r === r && p.c === c);
            if (existing) return;

            state.sun -= plantCfg.cost;
            const plant = {
                ...plantCfg,
                id: Date.now(),
                r, c,
                hp: plantCfg.hp,
                lastAction: Date.now()
            };
            
            const el = document.createElement('div');
            el.className = 'entity plant';
            el.id = `plant-${plant.id}`;
            el.innerText = plantCfg.name;
            el.style.backgroundColor = plantCfg.color;
            
            const cell = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
            cell.appendChild(el);
            
            state.plants.push(plant);
            updateUI();
        }

        function spawnSun() {
            if (!state.gameActive) return;
            const sun = document.createElement('div');
            sun.className = 'sun';
            sun.innerHTML = '☀️';
            sun.style.left = Math.random() * (window.innerWidth - 40) + 'px';
            sun.style.top = '-50px';
            sun.onclick = () => {
                state.sun += 25;
                sun.remove();
                updateUI();
            };
            document.getElementById('game-container').appendChild(sun);
            
            let top = -50;
            const targetTop = Math.random() * 400 + 100;
            const interval = setInterval(() => {
                top += 2;
                sun.style.top = top + 'px';
                if (top >= targetTop) clearInterval(interval);
            }, 20);

            setTimeout(() => { if(sun.parentNode) sun.remove(); }, 8000);
        }

        function spawnZombie() {
            if (!state.gameActive) return;
            const r = Math.floor(Math.random() * CONFIG.rows);
            const type = Math.random() > 0.8 ? 'fast' : 'basic';
            const cfg = CONFIG.zombies[type];
            
            const zombie = {
                ...cfg,
                id: Date.now(),
                r,
                x: 960,
                hp: cfg.hp,
                lastAction: Date.now()
            };
            
            const el = document.createElement('div');
            el.className = 'entity zombie';
            el.id = `zombie-${zombie.id}`;
            el.innerText = cfg.name;
            el.style.backgroundColor = cfg.color;
            el.style.left = zombie.x + 'px';
            el.style.top = (r * 120 + 60) + 'px';
            
            document.getElementById('game-container').appendChild(el);
            state.zombies.push(zombie);
        }

        setInterval(spawnZombie, CONFIG.zombieSpawnRate);

        function gameLoop() {
            if (!state.gameActive) return;

            // Projectiles
            state.projectiles.forEach((p, i) => {
                p.x += 5;
                p.el.style.left = p.x + 'px';
                p.el.style.top = (p.r * 120 + 85) + 'px';
                
                const hit = state.zombies.find(z => z.r === p.r && z.x < p.x + 15 && z.x > p.x - 15);
                if (hit) {
                    hit.hp -= p.damage;
                    p.el.remove();
                    state.projectiles.splice(i, 1);
                } else if (p.x > 960) {
                    p.el.remove();
                    state.projectiles.splice(i, 1);
                }
            });

            // Plants
            state.plants.forEach(p => {
                if (Date.now() - p.lastAction >= p.rate) {
                    if (p.damage > 0) {
                        const hasZombie = state.zombies.some(z => z.r === p.r && z.x > (p.c * 106.6));
                        if (hasZombie) {
                            const proj = document.createElement('div');
                            proj.className = 'projectile';
                            document.getElementById('game-container').appendChild(proj);
                            state.projectiles.push({
                                r: p.r, x: p.c * 106.6 + 60, damage: p.damage, el: proj
                            });
                        }
                    } else if (p.produceSun) {
                        state.sun += p.produceSun;
                        updateUI();
                        // Visual feedback
                        const el = document.getElementById(`plant-${p.id}`);
                        el.style.transform = 'scale(1.2)';
                        setTimeout(() => el.style.transform = 'scale(1)', 200);
                    }
                    p.lastAction = Date.now();
                }
            });

            // Zombies
            state.zombies.forEach((z, i) => {
                const plant = state.plants.find(p => p.r === z.r && (p.c * 106.6) > z.x - 60 && (p.c * 106.6) < z.x + 60);
                if (plant) {
                    if (Date.now() - z.lastAction >= 1000) {
                        plant.hp -= 20;
                        z.lastAction = Date.now();
                        
                        const pEl = document.getElementById(`plant-${plant.id}`);
                        if (pEl) {
                            pEl.style.backgroundColor = '#ff0000';
                            setTimeout(() => pEl.style.backgroundColor = plant.color, 100);
                        }
                        
                        if (plant.hp <= 0) {
                            const plantIdx = state.plants.indexOf(plant);
                            if (plantIdx > -1) {
                                document.getElementById(`plant-${plant.id}`).remove();
                                state.plants.splice(plantIdx, 1);
                            }
                        }
                    }
                } else {
                    z.x -= z.speed;
                    document.getElementById(`zombie-${z.id}`).style.left = z.x + 'px';
                }

                if (z.hp <= 0) {
                    state.score += 10;
                    document.getElementById(`zombie-${z.id}`).remove();
                    state.zombies.splice(i, 1);
                }

                if (z.x < 0) {
                    endGame();
                }
            });

            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            state.gameActive = false;
            overlayEl.style.display = 'flex';
            document.getElementById('overlay-title').innerText = 'Zombies Ate Your Brains!';
            
            saveScore(state.score);
            loadLeaderboard();
        }

        function saveScore(score) {
            const lb = JSON.parse(localStorage.getItem('pvz-lb') || '[]');
            lb.push({ name: 'Player ' + (lb.length + 1), score });
            lb.sort((a, b) => b.score - a.score);
            localStorage.setItem('pvz-lb', JSON.stringify(lb.slice(0, 5)));
        }

        function loadLeaderboard() {
            const lb = JSON.parse(localStorage.getItem('pvz-lb') || '[]');
            const content = document.getElementById('lb-content');
            content.innerHTML = lb.map((entry, i) => `
                <div class="lb-row">
                    <span>${i+1}. ${entry.name}</span>
                    <span>${entry.score}</span>
                </div>
            `).join('') || 'No scores yet!';
        }

        init();
    </script>
</body>
</html>
