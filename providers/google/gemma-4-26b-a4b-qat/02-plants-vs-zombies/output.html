<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plants vs Zombies Lite</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            font-family: 'Arial', sans-serif;
            color: white;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border: 4px solid #444;
        }
        canvas {
            display: block;
            background-color: #4e7a3a;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .menu {
            pointer-events: auto;
            background: rgba(0,0,0,0.8);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: block;
        }
        .menu.hidden {
            display: none;
        }
        h1 {
            margin-top: 0;
            color: #a3e635;
            text-shadow: 2px 2px #000;
        }
        button {
            padding: 10px 30px;
            font-size: 20px;
            background: #a3e635;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:hover {
            transform: scale(1.1);
        }
        #stats {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            display: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="stats">Score: <span id="score">0</span> | Lives: <span id="lives">5</span></div>
    <div id="ui">
        <div id="main-menu" class="menu">
            <h1>Plants vs Zombies Lite</h1>
            <p>Protect your sun from the zombies!</p>
            <button onclick="startGame()">START GAME</button>
        </div>
        <div id="game-over" class="menu hidden">
            <h1>GAME OVER</h1>
            <p>Final Score: <span id="final-score">0</span></p>
            <button onclick="location.reload()">RETRY</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const finalScoreEl = document.getElementById('final-score');
const mainMenu = document.getElementById('main-menu');
const gameOverMenu = document.getElementById('game-over');
const statsDiv = document.getElementById('stats');

const GRID_SIZE = 80;
const COLS = canvas.width / GRID_SIZE;
const ROWS = canvas.height / GRID_SIZE;

let score = 0;
let lives = 5;
let gameActive = false;
let frame = 0;

let plants = [];
let zombies = [];
let projectiles = [];
let suns = [];

class Sun {
    constructor(x, y, isDropped = false) {
        this.x = x;
        this.y = y;
        this.radius = 15;
        this.targetY = y;
        this.isDropped = isDropped;
        this.timer = 100;
    }
    update() {
        if (!this.isDropped && this.y < this.targetY) {
            this.y += 2;
        }
        this.timer--;
    }
    draw() {
        ctx.fillStyle = '#ffdf00';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#ffa500';
        ctx.lineWidth = 2;
        ctx.stroke();
    }
}

class Plant {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.hp = 100;
        this.lastShot = 0;
    }
    update() {
        frame++;
        if (frame - this.lastShot > 60) {
            if (zombies.some(z => z.y === this.y && z.x > this.x)) {
                projectiles.push(new Projectile(this.x + 40, this.y + 20));
                this.lastShot = frame;
            }
        }
    }
    draw() {
        ctx.fillStyle = '#4ade80';
        ctx.beginPath();
        ctx.arc(this.x + 40, this.y + 40, 30, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.fillStyle = 'black';
        ctx.beginPath();
        ctx.arc(this.x + 50, this.y + 30, 5, 0, Math.PI * 2);
        ctx.fill();
    }
}

class Zombie {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.hp = 100;
        this.speed = 0.5;
    }
    update() {
        let colliding = false;
        for (let p of projectiles) {
            if (p.x > this.x && p.x < this.x + 40 && p.y > this.y && p.y < this.y + 80) {
                this.hp -= 20;
                p.hit = true;
                colliding = true;
                break;
            }
        }

        if (!colliding) {
            let plantHit = false;
            for (let p of plants) {
                if (Math.abs(p.x + 40 - this.x) < 40 && Math.abs(p.y + 40 - this.y) < 40) {
                    p.hp -= 0.5;
                    plantHit = true;
                    break;
                }
            }
            if (!plantHit) {
                this.x -= this.speed;
            }
        }

        if (this.x < 0) {
            this.die();
        }
    }
    die() {
        lives--;
        if (lives <= 0) endGame();
        this.x = -100;
    }
    draw() {
        ctx.fillStyle = '#78350f';
        ctx.fillRect(this.x, this.y + 10, 40, 60);
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(this.x + 5, this.y + 20, 30, 15);
    }
}

class Projectile {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.speed = 5;
        this.hit = false;
    }
    update() {
        this.x += this.speed;
    }
    draw() {
        ctx.fillStyle = '#facc15';
        ctx.beginPath();
        ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
        ctx.fill();
    }
}

function startGame() {
    mainMenu.classList.add('hidden');
    gameOverMenu.classList.add('hidden');
    statsDiv.style.display = 'block';
    gameActive = true;
    score = 0;
    lives = 5;
    plants = [];
    zombies = [];
    projectiles = [];
    suns = [];
    frame = 0;
    scoreEl.innerText = score;
    livesEl.innerText = lives;
    requestAnimationFrame(gameLoop);
}

function endGame() {
    gameActive = false;
    gameOverMenu.classList.remove('hidden');
    statsDiv.style.display = 'none';
    finalScoreEl.innerText = score;
}

function gameLoop() {
    if (!gameActive) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    for (let i = 0; i <= COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * GRID_SIZE, 0);
        ctx.lineTo(i * GRID_SIZE, canvas.height);
        ctx.stroke();
    }
    for (let j = 0; j <= ROWS; j++) {
        ctx.beginPath();
        ctx.moveTo(0, j * GRID_SIZE);
        ctx.lineTo(canvas.width, j * GRID_SIZE);
        ctx.stroke();
    }

    if (frame % 180 === 0) {
        suns.push(new Sun(Math.random() * (canvas.width - 100) + 50, Math.random() * (canvas.height - 200) + 50, false));
    }

    if (frame % 300 === 0) {
        const row = Math.floor(Math.random() * ROWS);
        zombies.push(new Zombie(canvas.width, row * GRID_SIZE));
    }

    suns.forEach((s, i) => {
        s.update();
        s.draw();
        if (s.timer <= 0) suns.splice(i, 1);
    });

    plants.forEach((p, i) => {
        p.update();
        p.draw();
        if (p.hp <= 0) plants.splice(i, 1);
    });

    zombies.forEach((z, i) => {
        z.update();
        z.draw();
        if (z.hp <= 0) {
            zombies.splice(i, 1);
            score += 10;
            scoreEl.innerText = score;
        }
    });

    projectiles.forEach((p, i) => {
        p.update();
        p.draw();
        if (p.x > canvas.width || p.hit) projectiles.splice(i, 1);
    });

    requestAnimationFrame(gameLoop);
}

canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    for (let i = suns.length - 1; i >= 0; i--) {
        const s = suns[i];
        const dist = Math.hypot(s.x - x, s.y - y);
        if (dist < s.radius + 10) {
            score += 25;
            scoreEl.innerText = score;
            suns.splice(i, 1);
            return;
        }
    }

    const col = Math.floor(x / GRID_SIZE);
    const row = Math.floor(y / GRID_SIZE);
    const exists = plants.some(p => p.x === col * GRID_SIZE && p.y === row * GRID_SIZE);
    if (!exists) {
        plants.push(new Plant(col * GRID_SIZE, row * GRID_SIZE));
    }
});

</script>
</body>
</html>
