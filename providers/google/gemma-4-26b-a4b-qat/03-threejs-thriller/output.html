<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta namein="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thriller Dance - Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: sans-serif;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>
<div id="info">Thriller Dance Scene (Three.js)</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // Scene Setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.Fog(0x050505, 1, 50);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Lighting

    const ambientLight = new THREE.AmbientLight(0x404040, 1);
    scene.add(ambientLight);

    const spotLight = new THREE.SpotLight(0xffffff, 2);
    spotLight.position.set(0, 20, 0);
    spotLight.angle = 0.5;
    spotLight.penumbra = 0.3;
    spotLight.castShadow = true;
    scene.add(spotLight);

    const moonLight = new THREE.DirectionalLight(0x4444ff, 0.5);
    moonLight.position.set(5, 10, 5);
    scene.add(moonLight);

    // Floor
    const floorGeometry = new THREE.PlaneGeometry(100, 100);
    const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Characters
    const characters = [];
    const characterData = [
        { name: 'Michael Jackson', color: 0xffffff, pos: [-6, 0, 0], scale: 1.1 },
        { name: 'Pepe the Frog', color: 0x4ade80, pos: [-3, 0, 2], scale: 0.8 },
        { name: 'Donald Trump', color: 0xedc9af, pos: [3, 0, -2], scale: 1.0 },
        { name: 'Elon Musk', color: 0x333333, pos: [6, 0, 2], scale: 1.0 }
    ];

    characterData.forEach(data => {
        const group = new THREE.Group();

        // Body
        const bodyGeo = new THREE.BoxGeometry(1, 2, 0.5);
        const bodyMat = new THREE.MeshStandardMaterial({ color: data.color });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 1;
        body.castShadow = true;
        group.add(body);

        // Head
        const headGeo = new THREE.SphereGeometry(0.4, 32, 32);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 2.2;
        head.castShadow = true;
        group.add(head);

        group.position.set(...data.pos);
        group.scale.set(data.scale, data.scale, data.scale);
        
        scene.add(group);
        characters.push({ mesh: group, name: data.name, offset: Math.random() * Math.PI });
    });

    // Animation Loop
    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.002;

        characters.forEach((char, index) => {
            // Simple "Thriller" step-side-to-side motion
            char.mesh.position.y = Math.abs(Math.sin(time + char.offset)) * 0.5;
            char.mesh.rotation.y = Math.sin(time + char.offset) * 0.2;
            char.mesh.position.x += Math.sin(time + char.offset * 0.5) * 0.02;
        });

        // Camera movement
        camera.position.x = Math.sin(time * 0.3) * 2;
        camera.lookAt(0, 1, 0);

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
