<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Parallax Drive — Sunset</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#0d0010}
  canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, dpr;
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ─────────────────────────────────────
// SCENE CONSTANTS
// ─────────────────────────────────────
const ROAD_Y   = () => H * 0.68;   // horizon of road (perspective vanishing)
const GROUND_Y = () => H * 0.60;   // horizon line

// Parallax speed multipliers (pixels/sec at base speed 1)
const BASE_SPD = 220;
const LAYER = { sky:0, galaxy:0.02, mountains:0.04, hills:0.12, treeBg:0.25, poles:0.55, treeFg:0.75, ground:1.0, road:1.0 };

// ─────────────────────────────────────
// SKY GRADIENT helper
// ─────────────────────────────────────
function drawSky() {
  const gy = GROUND_Y();
  const g = ctx.createLinearGradient(0, 0, 0, gy);
  g.addColorStop(0,    '#0d001a');
  g.addColorStop(0.35, '#1a0040');
  g.addColorStop(0.60, '#5c0e60');
  g.addColorStop(0.78, '#c4401a');
  g.addColorStop(0.90, '#f77c1e');
  g.addColorStop(1,    '#ffe080');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, gy);
}

// ─────────────────────────────────────
// SUN
// ─────────────────────────────────────
function drawSun() {
  const gy = GROUND_Y();
  const sx = W * 0.72, sy = gy * 0.88;
  const r  = H * 0.055;
  // glow
  const g = ctx.createRadialGradient(sx, sy, r*0.2, sx, sy, r*4);
  g.addColorStop(0,   'rgba(255,210,80,0.55)');
  g.addColorStop(0.4, 'rgba(255,140,30,0.18)');
  g.addColorStop(1,   'rgba(255,80,10,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(sx, sy, r*4, 0, Math.PI*2);
  ctx.fill();
  // disk
  const disk = ctx.createRadialGradient(sx, sy, 0, sx, sy, r);
  disk.addColorStop(0,   '#ffe870');
  disk.addColorStop(0.6, '#ffb030');
  disk.addColorStop(1,   '#ff6010');
  ctx.fillStyle = disk;
  ctx.beginPath();
  ctx.arc(sx, sy, r, 0, Math.PI*2);
  ctx.fill();
}

// ─────────────────────────────────────
// STARS
// ─────────────────────────────────────
const stars = Array.from({length:120}, () => ({
  x: Math.random(), y: Math.random() * 0.55,
  r: Math.random() * 1.2 + 0.3,
  a: Math.random()
}));
let starPhase = 0;
function drawStars(dt) {
  starPhase += dt * 0.8;
  const gy = GROUND_Y();
  for (const s of stars) {
    const alpha = s.a * 0.7 * (0.5 + 0.5 * Math.sin(starPhase * 1.3 + s.x * 30));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * gy, s.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─────────────────────────────────────
// MOUNTAINS (2 layers)
// ─────────────────────────────────────
function buildMountainLayer(n, seed, yscale, color) {
  const pts = [];
  let x = 0;
  const rng = mulberry32(seed);
  while (x < n * 300) {
    const w = 180 + rng() * 260;
    const h = yscale * (0.45 + rng() * 0.55);
    pts.push({x, w, h});
    x += w * 0.7;
  }
  return {pts, color, totalW: x + 400};
}

function drawMountainLayer(layer, offset) {
  const gy = GROUND_Y();
  const tw = layer.totalW;
  const ox = ((offset % tw) + tw) % tw;

  ctx.beginPath();
  // draw two copies for seamless loop
  for (let rep = -1; rep <= 1; rep++) {
    const dx = rep * tw - ox;
    for (let i = 0; i < layer.pts.length; i++) {
      const p = layer.pts[i];
      const px = p.x + dx;
      if (px + p.w < -50 || px > W + 50) continue;
      if (i === 0 || px - 50 > W) ctx.moveTo(px, gy);
      ctx.lineTo(px, gy - p.h * gy);
      ctx.lineTo(px + p.w * 0.5, gy - p.h * gy * 1.0);
      ctx.lineTo(px + p.w, gy - p.h * gy * 0.1);
    }
  }
  ctx.lineTo(W + 50, gy);
  ctx.lineTo(-50, gy);
  ctx.closePath();
  ctx.fillStyle = layer.color;
  ctx.fill();
}

// ─────────────────────────────────────
// HILLS
// ─────────────────────────────────────
function buildHills(n, seed, color) {
  const rng = mulberry32(seed);
  const pts = [];
  let x = 0;
  while (x < n * 200) {
    const w = 220 + rng() * 300;
    const h = 0.08 + rng() * 0.12;
    pts.push({x, w, h});
    x += w * 0.65;
  }
  return {pts, color, totalW: x + 300};
}

function drawHills(layer, offset) {
  const gy = GROUND_Y();
  const tw = layer.totalW;
  const ox = ((offset % tw) + tw) % tw;

  ctx.beginPath();
  ctx.moveTo(-50, gy);
  for (let rep = -1; rep <= 1; rep++) {
    const dx = rep * tw - ox;
    for (const p of layer.pts) {
      const px = p.x + dx;
      if (px + p.w < -100 || px > W + 100) continue;
      // smooth hill using bezier
      ctx.moveTo(px, gy);
      ctx.bezierCurveTo(
        px + p.w*0.25, gy,
        px + p.w*0.25, gy - p.h * H,
        px + p.w*0.5,  gy - p.h * H
      );
      ctx.bezierCurveTo(
        px + p.w*0.75, gy - p.h * H,
        px + p.w*0.75, gy,
        px + p.w,      gy
      );
    }
  }
  ctx.lineTo(W + 50, gy);
  ctx.fillStyle = layer.color;
  ctx.fill();
}

// ─────────────────────────────────────
// ROAD + GROUND
// ─────────────────────────────────────
let dashOffset = 0;

function drawRoad(speed) {
  const gy  = GROUND_Y();
  const ry  = ROAD_Y();
  const bot = H;

  // ground fill
  const gg = ctx.createLinearGradient(0, gy, 0, bot);
  gg.addColorStop(0, '#1a3010');
  gg.addColorStop(0.25, '#111f0a');
  gg.addColorStop(1, '#0a1208');
  ctx.fillStyle = gg;
  ctx.fillRect(0, gy, W, bot - gy);

  // road surface with perspective trapezoid
  const rw_top = W * 0.22, rw_bot = W * 0.70;
  const rx_top = (W - rw_top) / 2, rx_bot = (W - rw_bot) / 2;

  ctx.beginPath();
  ctx.moveTo(rx_top, gy);
  ctx.lineTo(rx_top + rw_top, gy);
  ctx.lineTo(rx_bot + rw_bot, bot + 20);
  ctx.lineTo(rx_bot, bot + 20);
  ctx.closePath();

  const rg = ctx.createLinearGradient(0, gy, 0, bot);
  rg.addColorStop(0, '#1e1e22');
  rg.addColorStop(0.4, '#2a2a30');
  rg.addColorStop(1, '#383840');
  ctx.fillStyle = rg;
  ctx.fill();

  // road edge lines
  ctx.strokeStyle = 'rgba(255,220,80,0.7)';
  ctx.lineWidth = 2.5;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(rx_top, gy); ctx.lineTo(rx_bot, bot + 20);
  ctx.moveTo(rx_top + rw_top, gy); ctx.lineTo(rx_bot + rw_bot, bot + 20);
  ctx.stroke();

  // centre dashes with perspective
  dashOffset = (dashOffset + speed * 0.016) % 1;
  const nDashes = 10;
  for (let i = -1; i < nDashes + 1; i++) {
    const t0 = ((i + dashOffset) / nDashes);
    const t1 = ((i + dashOffset + 0.4) / nDashes);
    if (t0 > 1 || t1 < 0) continue;
    const ct0 = Math.max(0, Math.min(1, t0));
    const ct1 = Math.max(0, Math.min(1, t1));

    function lerp(a,b,t){return a+(b-a)*t}
    const y0 = lerp(gy, bot + 20, ct0);
    const y1 = lerp(gy, bot + 20, ct1);
    const cx0 = lerp(W/2, W/2, ct0);
    const cx1 = lerp(W/2, W/2, ct1);
    const hw0 = lerp(2, 9, ct0);
    const hw1 = lerp(2, 9, ct1);

    ctx.beginPath();
    ctx.moveTo(cx0 - hw0, y0);
    ctx.lineTo(cx0 + hw0, y0);
    ctx.lineTo(cx1 + hw1, y1);
    ctx.lineTo(cx1 - hw1, y1);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,200,0.82)';
    ctx.fill();
  }
}

// ─────────────────────────────────────
// TREES
// ─────────────────────────────────────
function buildTrees(n, seed, minH, maxH, color, trunkColor) {
  const rng = mulberry32(seed);
  const items = [];
  let x = 0;
  while (x < n * 130) {
    const gap   = 80 + rng() * 160;
    const h     = minH + rng() * (maxH - minH);
    const type  = rng() < 0.6 ? 'pine' : 'round';
    items.push({x, h, type});
    x += gap;
  }
  return {items, color, trunkColor, totalW: x + 200};
}

function drawTrees(layer, offset, yBase, side) {
  const tw = layer.totalW;
  const ox = ((offset % tw) + tw) % tw;
  const gy = yBase;

  for (let rep = -1; rep <= 1; rep++) {
    const dx = rep * tw - ox;
    for (const item of layer.items) {
      const px = item.x + dx;
      if (px < -80 || px > W + 80) continue;
      const h  = item.h;
      const tw2 = h * 0.45;

      // trunk
      ctx.fillStyle = layer.trunkColor;
      ctx.fillRect(px - h*0.04, gy - h*0.18, h*0.08, h*0.18);

      if (item.type === 'pine') {
        // three tiers
        ctx.fillStyle = layer.color;
        for (let t = 0; t < 3; t++) {
          const ty  = gy - h * (0.15 + t * 0.26);
          const tw3 = tw2 * (1 - t * 0.22);
          ctx.beginPath();
          ctx.moveTo(px, ty - h * 0.3);
          ctx.lineTo(px - tw3, ty);
          ctx.lineTo(px + tw3, ty);
          ctx.closePath();
          ctx.fill();
        }
      } else {
        ctx.fillStyle = layer.color;
        ctx.beginPath();
        ctx.arc(px, gy - h * 0.55, tw2 * 0.9, 0, Math.PI*2);
        ctx.fill();
        // highlight
        ctx.fillStyle = 'rgba(255,255,255,0.07)';
        ctx.beginPath();
        ctx.arc(px - tw2*0.2, gy - h * 0.62, tw2 * 0.4, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }
}

// ─────────────────────────────────────
// POLES (telephone / electric)
// ─────────────────────────────────────
function buildPoles(n, seed) {
  const rng = mulberry32(seed);
  const items = [];
  let x = 0;
  while (x < n * 180) {
    const gap = 120 + rng() * 100;
    items.push({x, nLines: 2 + Math.floor(rng()*3)});
    x += gap;
  }
  return {items, totalW: x + 200};
}

function drawPoles(layer, offset) {
  const tw = layer.totalW;
  const ox = ((offset % tw) + tw) % tw;
  const gy = GROUND_Y();
  const pH = H * 0.22;

  for (let rep = -1; rep <= 1; rep++) {
    const dx = rep * tw - ox;
    for (const p of layer.items) {
      const px = p.x + dx;
      if (px < -30 || px > W + 30) continue;

      // pole
      ctx.strokeStyle = '#2a2220';
      ctx.lineWidth = 3;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(px, gy);
      ctx.lineTo(px, gy - pH);
      ctx.stroke();

      // cross arm
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(px - 18, gy - pH + 10);
      ctx.lineTo(px + 18, gy - pH + 10);
      ctx.stroke();

      // wires going offscreen left
      ctx.strokeStyle = 'rgba(30,20,15,0.7)';
      ctx.lineWidth = 1;
      for (let i = 0; i < p.nLines; i++) {
        const wy = gy - pH + 10 + i * 7;
        ctx.beginPath();
        ctx.moveTo(px - 18, wy);
        ctx.quadraticCurveTo(px - 80, wy + 6, px - 160, wy + 3);
        ctx.stroke();
      }
    }
  }
}

// ─────────────────────────────────────
// CAR DRAWING
// ─────────────────────────────────────
let carBob = 0, carBobV = 0;

function drawCar(t) {
  const gy = GROUND_Y();
  const carW = W * 0.28;
  const carH = carW * 0.38;
  const cx   = W * 0.30;  // car centre x
  const by   = gy - 2;    // bottom of wheels on ground

  // subtle bounce
  carBobV += (-carBob * 18 - carBobV * 3.5) * 0.016;
  carBobV += (Math.sin(t * 14.3) * 0.9 + Math.sin(t * 7.1) * 0.5) * 0.016;
  carBob  += carBobV;
  const bobY = carBob * 2.5;

  const wr = carW * 0.135; // wheel radius
  const axleY = by - wr;

  // wheel positions
  const wx1 = cx - carW * 0.30;
  const wx2 = cx + carW * 0.28;

  // ── SHADOW ──
  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath();
  ctx.ellipse(cx, by + 6, carW * 0.44, carW * 0.04, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  function drawWheel(wx) {
    const angle = t * BASE_SPD / wr;
    // tyre
    ctx.beginPath();
    ctx.arc(wx, axleY + bobY, wr, 0, Math.PI*2);
    ctx.fillStyle = '#18171a';
    ctx.fill();
    ctx.strokeStyle = '#2e2c35';
    ctx.lineWidth = 2;
    ctx.stroke();

    // rim
    ctx.beginPath();
    ctx.arc(wx, axleY + bobY, wr * 0.68, 0, Math.PI*2);
    ctx.fillStyle = '#b8b0a0';
    ctx.fill();

    // hub
    ctx.beginPath();
    ctx.arc(wx, axleY + bobY, wr * 0.18, 0, Math.PI*2);
    ctx.fillStyle = '#808080';
    ctx.fill();

    // spokes
    const nSpokes = 5;
    for (let i = 0; i < nSpokes; i++) {
      const a = angle + (i / nSpokes) * Math.PI * 2;
      ctx.strokeStyle = '#a0a0a0';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(wx + Math.cos(a) * wr * 0.18, axleY + bobY + Math.sin(a) * wr * 0.18);
      ctx.lineTo(wx + Math.cos(a) * wr * 0.60, axleY + bobY + Math.sin(a) * wr * 0.60);
      ctx.stroke();
    }
    // tyre highlight
    ctx.beginPath();
    ctx.arc(wx, axleY + bobY, wr, -Math.PI*0.7, -Math.PI*0.3);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  // ── CAR BODY ──
  const bodyY  = axleY + bobY - carH * 0.18;
  const bodyX  = cx - carW * 0.50;

  // underbody / chassis
  ctx.beginPath();
  ctx.roundRect(bodyX, bodyY - carH * 0.25, carW, carH * 0.25, [0, 0, 4, 4]);
  ctx.fillStyle = '#111015';
  ctx.fill();

  // main body
  const bodyPath = new Path2D();
  bodyPath.moveTo(bodyX + carW * 0.04, bodyY);
  bodyPath.lineTo(bodyX, bodyY - carH * 0.30);
  bodyPath.bezierCurveTo(
    bodyX + carW*0.08, bodyY - carH*0.58,
    bodyX + carW*0.22, bodyY - carH*0.80,
    bodyX + carW*0.32, bodyY - carH*0.82
  );
  bodyPath.lineTo(bodyX + carW*0.68, bodyY - carH*0.82);
  bodyPath.bezierCurveTo(
    bodyX + carW*0.80, bodyY - carH*0.80,
    bodyX + carW*0.92, bodyY - carH*0.58,
    bodyX + carW*0.97, bodyY - carH*0.30
  );
  bodyPath.lineTo(bodyX + carW, bodyY);
  bodyPath.closePath();

  const bodyGrad = ctx.createLinearGradient(bodyX, bodyY - carH, bodyX, bodyY);
  bodyGrad.addColorStop(0,   '#1e3a6e');
  bodyGrad.addColorStop(0.3, '#2450a0');
  bodyGrad.addColorStop(0.6, '#1a3070');
  bodyGrad.addColorStop(1,   '#101828');
  ctx.fillStyle = bodyGrad;
  ctx.fill(bodyPath);

  // body highlight — top specular
  const hg = ctx.createLinearGradient(bodyX, bodyY - carH*0.82, bodyX + carW, bodyY - carH*0.82);
  hg.addColorStop(0,   'rgba(255,255,255,0)');
  hg.addColorStop(0.3, 'rgba(255,255,255,0.18)');
  hg.addColorStop(0.7, 'rgba(255,255,255,0.08)');
  hg.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.fillStyle = hg;
  ctx.fill(bodyPath);

  // body outline
  ctx.strokeStyle = '#0a0f1e';
  ctx.lineWidth = 1.5;
  ctx.stroke(bodyPath);

  // ── WINDOWS ──
  const winY = bodyY - carH * 0.78;

  // windshield
  ctx.beginPath();
  ctx.moveTo(bodyX + carW*0.32, winY);
  ctx.lineTo(bodyX + carW*0.28, winY + carH*0.32);
  ctx.lineTo(bodyX + carW*0.50, winY + carH*0.36);
  ctx.lineTo(bodyX + carW*0.50, winY + carH*0.02);
  ctx.closePath();
  const wg = ctx.createLinearGradient(bodyX + carW*0.28, winY, bodyX + carW*0.50, winY + carH*0.36);
  wg.addColorStop(0, 'rgba(180,230,255,0.60)');
  wg.addColorStop(1, 'rgba(60,100,180,0.25)');
  ctx.fillStyle = wg;
  ctx.fill();
  ctx.strokeStyle = '#0a0f1e';
  ctx.lineWidth = 1;
  ctx.stroke();

  // rear window
  ctx.beginPath();
  ctx.moveTo(bodyX + carW*0.52, winY);
  ctx.lineTo(bodyX + carW*0.52, winY + carH*0.36);
  ctx.lineTo(bodyX + carW*0.72, winY + carH*0.32);
  ctx.lineTo(bodyX + carW*0.68, winY);
  ctx.closePath();
  const rg2 = ctx.createLinearGradient(bodyX + carW*0.52, winY, bodyX + carW*0.72, winY + carH*0.32);
  rg2.addColorStop(0, 'rgba(180,230,255,0.50)');
  rg2.addColorStop(1, 'rgba(60,100,180,0.20)');
  ctx.fillStyle = rg2;
  ctx.fill();
  ctx.stroke();

  // window highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath();
  ctx.moveTo(bodyX + carW*0.33, winY + carH*0.04);
  ctx.lineTo(bodyX + carW*0.29, winY + carH*0.16);
  ctx.lineTo(bodyX + carW*0.36, winY + carH*0.18);
  ctx.lineTo(bodyX + carW*0.38, winY + carH*0.06);
  ctx.closePath();
  ctx.fill();

  // ── HEADLIGHTS ──
  // front (right side)
  ctx.save();
  const hlx = bodyX + carW * 0.98;
  const hly = bodyY - carH * 0.22;
  const hg2 = ctx.createRadialGradient(hlx, hly, 0, hlx + carW*0.3, hly, carW*0.4);
  hg2.addColorStop(0,   'rgba(255,240,180,0.90)');
  hg2.addColorStop(0.3, 'rgba(255,220,100,0.40)');
  hg2.addColorStop(1,   'rgba(255,180,50,0)');
  ctx.fillStyle = hg2;
  ctx.beginPath();
  ctx.ellipse(hlx + carW*0.08, hly, carW*0.35, carW*0.08, -0.08, 0, Math.PI*2);
  ctx.fill();
  // lens
  ctx.beginPath();
  ctx.ellipse(hlx, hly, carW*0.028, carH*0.07, 0, 0, Math.PI*2);
  ctx.fillStyle = '#fff8d0';
  ctx.fill();
  ctx.restore();

  // ── TAILLIGHTS ──
  const tlx = bodyX + carW * 0.01;
  const tly = bodyY - carH * 0.22;
  const tailGlow = ctx.createRadialGradient(tlx, tly, 0, tlx - carW*0.1, tly, carW*0.2);
  tailGlow.addColorStop(0,   'rgba(255,40,10,0.8)');
  tailGlow.addColorStop(0.4, 'rgba(255,20,0,0.3)');
  tailGlow.addColorStop(1,   'rgba(255,0,0,0)');
  ctx.fillStyle = tailGlow;
  ctx.beginPath();
  ctx.ellipse(tlx - carW*0.04, tly, carW*0.18, carW*0.06, 0, 0, Math.PI*2);
  ctx.fill();
  // lens
  ctx.beginPath();
  ctx.ellipse(tlx, tly, carW*0.024, carH*0.065, 0, 0, Math.PI*2);
  ctx.fillStyle = '#ff3010';
  ctx.fill();

  // ── GROUND REFLECTION ──
  ctx.save();
  ctx.globalAlpha = 0.10;
  ctx.scale(1, -1);
  ctx.translate(0, -(by + 5) * 2);
  const bodyGrad2 = ctx.createLinearGradient(bodyX, bodyY - carH, bodyX, bodyY);
  bodyGrad2.addColorStop(0,   '#2450a0');
  bodyGrad2.addColorStop(1,   '#101828');
  ctx.fillStyle = bodyGrad2;
  ctx.fill(bodyPath);
  ctx.restore();

  // draw wheels on top
  drawWheel(wx1);
  drawWheel(wx2);

  // wheel arch shadows
  ctx.save();
  ctx.globalAlpha = 0.55;
  for (const wx of [wx1, wx2]) {
    ctx.beginPath();
    ctx.arc(wx, axleY + bobY, wr + 3, Math.PI*0.85, Math.PI*2.15);
    ctx.lineWidth = 6;
    ctx.strokeStyle = '#080810';
    ctx.stroke();
  }
  ctx.restore();
}

// ─────────────────────────────────────
// ROAD SHIMMER / HEAT HAZE
// ─────────────────────────────────────
function drawRoadShimmer(t) {
  const gy = GROUND_Y();
  const sg = ctx.createLinearGradient(0, gy, 0, gy + H*0.07);
  sg.addColorStop(0, 'rgba(255,200,100,0.05)');
  sg.addColorStop(0.5, 'rgba(255,200,100,0.02)');
  sg.addColorStop(1, 'rgba(255,200,100,0)');
  ctx.fillStyle = sg;
  ctx.fillRect(0, gy, W, H*0.07);
}

// ─────────────────────────────────────
// UTILITY — mulberry32 PRNG
// ─────────────────────────────────────
function mulberry32(seed) {
  let s = seed >>> 0;
  return function() {
    s |= 0; s = s + 0x6D2B79F5 | 0;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ─────────────────────────────────────
// BUILD SCENE OBJECTS
// ─────────────────────────────────────
const mtn1 = buildMountainLayer(12, 1, 0.45, '#3a1060');
const mtn2 = buildMountainLayer(14, 7, 0.32, '#5a1a80');
const hill1 = buildHills(14, 3, '#1a4a10');
const hill2 = buildHills(18, 9, '#1e5c14');
const treeBg = buildTrees(20, 5, H*0.10, H*0.16, '#0f2a0a', '#0a1a06');
const treeFg = buildTrees(16, 11, H*0.14, H*0.22, '#0b2208', '#060f04');
const poleLayer = buildPoles(16, 2);

// ─────────────────────────────────────
// OFFSETS
// ─────────────────────────────────────
const offsets = {
  mountains: 0, hills: 0,
  treeBg: 0, treeFg: 0, poles: 0, road: 0
};

// ─────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────
let last = 0;
let elapsed = 0;

function frame(now) {
  requestAnimationFrame(frame);
  const dt  = Math.min((now - last) / 1000, 0.05);
  last = now;
  elapsed += dt;
  const spd = BASE_SPD;

  // advance offsets
  offsets.mountains += spd * LAYER.mountains * dt;
  offsets.hills     += spd * LAYER.hills     * dt;
  offsets.treeBg    += spd * LAYER.treeBg    * dt;
  offsets.poles     += spd * LAYER.poles     * dt;
  offsets.treeFg    += spd * LAYER.treeFg    * dt;
  offsets.road      += spd * LAYER.road      * dt;

  // ── DRAW ──
  ctx.clearRect(0, 0, W, H);

  drawSky();
  drawSun();
  drawStars(dt);
  drawMountainLayer(mtn1, offsets.mountains * 0.7);
  drawMountainLayer(mtn2, offsets.mountains);
  drawHills(hill1, offsets.hills * 0.6);
  drawHills(hill2, offsets.hills);
  drawTrees(treeBg, offsets.treeBg, GROUND_Y() + 2, 'both');
  drawPoles(poleLayer, offsets.poles);
  drawRoad(offsets.road);
  drawTrees(treeFg, offsets.treeFg, GROUND_Y() + 2, 'both');
  drawRoadShimmer(elapsed);
  drawCar(elapsed);

  // vignette
  const vg = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.85);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,10,0.55)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
}

requestAnimationFrame(frame);
</script>
