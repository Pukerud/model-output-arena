<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Thriller — A Cinematic Dance Scene</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #050010; color: #eee; font-family: 'Trebuchet MS', system-ui, sans-serif; }
  canvas { display: block; }
  #ui {
    position: absolute; top: 14px; left: 14px; z-index: 10;
    background: rgba(0,0,0,0.55); padding: 10px 12px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12); backdrop-filter: blur(8px);
    display: flex; flex-direction: column; gap: 6px; min-width: 180px;
  }
  #ui h1 { margin: 0 0 4px; font-size: 14px; letter-spacing: 0.04em; color: #ffd060; }
  #ui button {
    background: linear-gradient(180deg, #2a1a3a, #150820);
    color: #fff; border: 1px solid #6a3aa0; border-radius: 6px;
    padding: 6px 8px; cursor: pointer; font-size: 12px; text-align: left;
  }
  #ui button.active { background: linear-gradient(180deg, #ffd060, #c08830); color: #1a1422; border-color: #ffd060; }
  #ui .row { display: flex; gap: 6px; flex-wrap: wrap; }
  #ui label { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  #credits { position: absolute; bottom: 8px; right: 12px; font-size: 11px; opacity: 0.4; z-index: 10; }
</style>
</head>
<body>
<div id="ui">
  <h1>🎬 Thriller — MiniMax Code</h1>
  <div class="row">
    <button id="playBtn">⏵ Play</button>
    <button id="camFront" class="active">Front</button>
    <button id="camOrbit">Orbit</button>
    <button id="camLow">Low</button>
    <button id="camCrane">Crane</button>
  </div>
  <label><input type="checkbox" id="fogToggle" checked> Fog</label>
  <label><input type="checkbox" id="spotToggle" checked> Spotlights</label>
</div>
<div id="credits">Procedural characters · Three.js · No external assets</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }    from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass }    from 'three/addons/postprocessing/ShaderPass.js';
import { FXAAShader }    from 'three/addons/shaders/FXAAShader.js';

// ---------- Scene ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050010);
scene.fog = new THREE.FogExp2(0x0a0020, 0.035);

const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 2.0, 9);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ---------- Lighting ----------
const ambient = new THREE.AmbientLight(0x202040, 0.4);
scene.add(ambient);

const moon = new THREE.DirectionalLight(0x9fb0ff, 1.3);
moon.position.set(-8, 14, 6);
moon.castShadow = true;
moon.shadow.mapSize.set(2048, 2048);
moon.shadow.camera.left = -15;
moon.shadow.camera.right = 15;
moon.shadow.camera.top = 15;
moon.shadow.camera.bottom = -15;
moon.shadow.camera.near = 1;
moon.shadow.camera.far = 40;
scene.add(moon);

const rim = new THREE.DirectionalLight(0xff7050, 0.6);
rim.position.set(8, 4, -6);
scene.add(rim);

const backPurple = new THREE.PointLight(0x7030a0, 1.4, 30);
backPurple.position.set(0, 3, -8);
scene.add(backPurple);

// Spotlights (4 around the dance floor)
const spotColors = [0xff8030, 0xff4080, 0x8060ff, 0x40c0ff];
const spots = [];
for (let i = 0; i < 4; i++) {
  const s = new THREE.SpotLight(spotColors[i], 30, 30, Math.PI / 6, 0.4, 1.5);
  const a = (i / 4) * Math.PI * 2;
  s.position.set(Math.cos(a) * 5, 5, Math.sin(a) * 5);
  s.target.position.set(0, 0, 0);
  scene.add(s); scene.add(s.target);
  spots.push(s);
}

// ---------- Ground & stage ----------
const groundGeo = new THREE.PlaneGeometry(60, 60, 30, 30);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a1024, roughness: 0.95, metalness: 0.05 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
// displace a bit for natural ground
const gPos = groundGeo.attributes.position;
for (let i = 0; i < gPos.count; i++) {
  const x = gPos.getX(i), y = gPos.getY(i);
  const h = Math.sin(x * 0.4) * 0.05 + Math.cos(y * 0.5) * 0.05;
  gPos.setZ(i, h);
}
groundGeo.computeVertexNormals();
scene.add(ground);

// Glowing stage disc
const stageGeo = new THREE.CylinderGeometry(4, 4.1, 0.05, 64);
const stageMat = new THREE.MeshStandardMaterial({
  color: 0x301040, emissive: 0x4020a0, emissiveIntensity: 0.4,
  roughness: 0.6, metalness: 0.3,
});
const stage = new THREE.Mesh(stageGeo, stageMat);
stage.position.y = 0.04;
stage.receiveShadow = true;
scene.add(stage);

// Ring
const ringGeo = new THREE.RingGeometry(4.05, 4.2, 64);
const ringMat = new THREE.MeshBasicMaterial({ color: 0xffd060, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.06;
scene.add(ring);

// ---------- Graveyard decor ----------
// Tombstones
function addTombstone(x, z, rot, size) {
  const g = new THREE.BoxGeometry(size, 1.0, 0.2);
  const m = new THREE.MeshStandardMaterial({ color: 0x4a4a55, roughness: 0.9 });
  const t = new THREE.Mesh(g, m);
  t.position.set(x, 0.5, z);
  t.rotation.y = rot;
  t.castShadow = true; t.receiveShadow = true;
  scene.add(t);
}
for (let i = 0; i < 12; i++) {
  const a = (i / 12) * Math.PI * 2;
  const r = 6 + Math.random() * 2;
  addTombstone(Math.cos(a) * r, Math.sin(a) * r, Math.random() * 0.4, 0.6 + Math.random() * 0.3);
}
// Dead trees
function addTree(x, z) {
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.1, 0.18, 2.5, 6),
    new THREE.MeshStandardMaterial({ color: 0x1a0a0a, roughness: 0.9 })
  );
  trunk.position.set(x, 1.25, z);
  trunk.castShadow = true;
  scene.add(trunk);
  for (let i = 0; i < 4; i++) {
    const b = new THREE.Mesh(
      new THREE.CylinderGeometry(0.04, 0.08, 1 + Math.random() * 0.6, 4),
      new THREE.MeshStandardMaterial({ color: 0x150505, roughness: 0.9 })
    );
    b.position.set(x + (Math.random() - 0.5) * 0.4, 1.6 + Math.random() * 0.6, z + (Math.random() - 0.5) * 0.4);
    b.rotation.z = (Math.random() - 0.5) * 0.8;
    b.castShadow = true;
    scene.add(b);
  }
}
addTree(-7, -4); addTree(7, -3); addTree(-6, 5); addTree(8, 6);

// Moon disc
const moonDisc = new THREE.Mesh(
  new THREE.CircleGeometry(1.2, 32),
  new THREE.MeshBasicMaterial({ color: 0xfff4d0 })
);
moonDisc.position.set(-8, 12, -20);
scene.add(moonDisc);

// Moon halo (sprite)
const haloCanvas = document.createElement('canvas');
haloCanvas.width = 128; haloCanvas.height = 128;
{
  const c = haloCanvas.getContext('2d');
  const g = c.createRadialGradient(64, 64, 0, 64, 64, 64);
  g.addColorStop(0, 'rgba(255,240,200,0.9)');
  g.addColorStop(0.4, 'rgba(255,200,150,0.4)');
  g.addColorStop(1, 'rgba(255,160,100,0)');
  c.fillStyle = g; c.fillRect(0, 0, 128, 128);
}
const haloTex = new THREE.CanvasTexture(haloCanvas);
const halo = new THREE.Sprite(new THREE.SpriteMaterial({ map: haloTex, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending }));
halo.position.copy(moonDisc.position);
halo.scale.set(6, 6, 1);
scene.add(halo);

// Starfield
{
  const starCount = 400;
  const positions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    positions[i*3]   = (Math.random() - 0.5) * 80;
    positions[i*3+1] = 6 + Math.random() * 14;
    positions[i*3+2] = -10 - Math.random() * 30;
  }
  const sg = new THREE.BufferGeometry();
  sg.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const sm = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, sizeAttenuation: true, transparent: true, opacity: 0.85 });
  scene.add(new THREE.Points(sg, sm));
}

// Fog particles (drifting upward)
const fogParticles = (() => {
  const N = 800;
  const pos = new Float32Array(N * 3);
  const vel = new Float32Array(N);
  for (let i = 0; i < N; i++) {
    pos[i*3]   = (Math.random() - 0.5) * 14;
    pos[i*3+1] = Math.random() * 6;
    pos[i*3+2] = (Math.random() - 0.5) * 14;
    vel[i] = 0.2 + Math.random() * 0.6;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const m = new THREE.PointsMaterial({
    color: 0x8070a0, size: 0.12, transparent: true, opacity: 0.45,
    depthWrite: false, blending: THREE.AdditiveBlending,
  });
  const pts = new THREE.Points(g, m);
  scene.add(pts);
  return { pts, vel };
})();

// ---------- Character builder ----------
function buildMichael() {
  const root = new THREE.Group();
  const skin = new THREE.MeshStandardMaterial({ color: 0xf2c8a0, roughness: 0.7 });
  const suit = new THREE.MeshStandardMaterial({ color: 0x1a1a22, roughness: 0.6 });
  const shirt = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6 });
  const jacket = new THREE.MeshStandardMaterial({ color: 0xc02020, roughness: 0.5 });
  const shoe = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.5 });
  const sock = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.7 });
  // Pants
  const pants = new THREE.Group();
  for (let i = 0; i < 2; i++) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.10, 0.09, 0.9, 8), suit);
    leg.position.set(i ? 0.13 : -0.13, 0.45, 0);
    pants.add(leg);
  }
  root.add(pants);
  // Socks
  for (let i = 0; i < 2; i++) {
    const s = new THREE.Mesh(new THREE.CylinderGeometry(0.095, 0.10, 0.18, 8), sock);
    s.position.set(i ? 0.13 : -0.13, 0.10, 0);
    root.add(s);
  }
  // Shoes (loafers)
  for (let i = 0; i < 2; i++) {
    const sh = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.08, 0.28), shoe);
    sh.position.set(i ? 0.13 : -0.13, 0.04, 0.04);
    root.add(sh);
  }
  // Torso (suit jacket)
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 0.28), suit);
  torso.position.y = 1.15;
  torso.castShadow = true;
  root.add(torso);
  // Red jacket overlay
  const j = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.62, 0.30), jacket);
  j.position.y = 1.15;
  j.castShadow = true;
  root.add(j);
  // Shirt
  const s = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.55, 0.32), shirt);
  s.position.y = 1.18;
  root.add(s);
  // Belt
  const belt = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.05, 0.30), new THREE.MeshStandardMaterial({ color: 0x000000 }));
  belt.position.y = 0.93;
  root.add(belt);
  // Neck
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.10, 0.12, 8), skin);
  neck.position.y = 1.52;
  root.add(neck);
  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.16, 16, 12), skin);
  head.position.y = 1.72;
  head.castShadow = true;
  root.add(head);
  // Hair (afro-ish) + Fedora
  const hair = new THREE.Mesh(new THREE.SphereGeometry(0.165, 16, 12, 0, Math.PI*2, 0, Math.PI/2), new THREE.MeshStandardMaterial({ color: 0x1a0a05, roughness: 0.9 }));
  hair.position.y = 1.78;
  root.add(hair);
  // Fedora
  const fedBrim = new THREE.Mesh(new THREE.CylinderGeometry(0.20, 0.20, 0.015, 16), new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 }));
  fedBrim.position.y = 1.86;
  root.add(fedBrim);
  const fedTop = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.14, 0.12, 16), new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 }));
  fedTop.position.y = 1.92;
  root.add(fedTop);
  // Sunglasses
  const sg = new THREE.Group();
  for (let i = 0; i < 2; i++) {
    const l = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.04, 0.02), new THREE.MeshStandardMaterial({ color: 0x0a0a0a, metalness: 0.6, roughness: 0.2 }));
    l.position.set((i ? 0.06 : -0.06), 0, 0.155);
    sg.add(l);
  }
  const bridge = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.015, 0.02), new THREE.MeshStandardMaterial({ color: 0x0a0a0a }));
  bridge.position.set(0, 0, 0.155);
  sg.add(bridge);
  sg.position.y = 1.74;
  root.add(sg);
  // Arms (group so we can rotate)
  const arms = new THREE.Group();
  arms.position.y = 1.30;
  for (let i = 0; i < 2; i++) {
    const arm = new THREE.Group();
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.06, 0.45, 8), jacket);
    upper.position.y = -0.20;
    arm.add(upper);
    const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.045, 0.45, 8), shirt);
    lower.position.y = -0.50;
    arm.add(lower);
    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 6), skin);
    hand.position.y = -0.74;
    arm.add(hand);
    arm.position.set(i ? 0.30 : -0.30, 0, 0);
    arms.add(arm);
  }
  root.add(arms);
  root.userData.parts = { arms, head, torso, pants };
  return root;
}

function buildPepe() {
  const root = new THREE.Group();
  const skin = new THREE.MeshStandardMaterial({ color: 0x6ec24a, roughness: 0.7 });
  // Pants (blue) - simple
  for (let i = 0; i < 2; i++) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.10, 0.09, 0.9, 8), new THREE.MeshStandardMaterial({ color: 0x2244aa, roughness: 0.7 }));
    leg.position.set(i ? 0.13 : -0.13, 0.45, 0);
    root.add(leg);
  }
  for (let i = 0; i < 2; i++) {
    const sh = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.08, 0.28), new THREE.MeshStandardMaterial({ color: 0x0a0a0a }));
    sh.position.set(i ? 0.13 : -0.13, 0.04, 0.04);
    root.add(sh);
  }
  // Torso
  const torso = new THREE.Mesh(new THREE.SphereGeometry(0.30, 16, 12), skin);
  torso.scale.set(1, 1.1, 0.9);
  torso.position.y = 1.10;
  torso.castShadow = true;
  root.add(torso);
  // Head — big round frog head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 20, 16), skin);
  head.position.y = 1.70;
  head.castShadow = true;
  root.add(head);
  // Eyes (bulging white with black pupil)
  for (let i = 0; i < 2; i++) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.10, 12, 10), new THREE.MeshStandardMaterial({ color: 0xffffff }));
    eye.position.set((i ? 0.13 : -0.13), 1.82, 0.22);
    root.add(eye);
    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.04, 10, 8), new THREE.MeshStandardMaterial({ color: 0x000000 }));
    pupil.position.set((i ? 0.16 : -0.10), 1.82, 0.30);
    root.add(pupil);
  }
  // Wide mouth
  const mouth = new THREE.Mesh(new THREE.TorusGeometry(0.16, 0.025, 8, 24, Math.PI), new THREE.MeshStandardMaterial({ color: 0x222222 }));
  mouth.position.set(0, 1.58, 0.28);
  mouth.rotation.x = Math.PI;
  root.add(mouth);
  // Arms
  const arms = new THREE.Group();
  for (let i = 0; i < 2; i++) {
    const arm = new THREE.Group();
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.06, 0.45, 8), skin);
    upper.position.y = -0.20;
    arm.add(upper);
    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 6), skin);
    hand.position.y = -0.50;
    arm.add(hand);
    arm.position.set(i ? 0.32 : -0.32, 1.20, 0);
    arms.add(arm);
  }
  root.add(arms);
  root.userData.parts = { arms, head, torso };
  return root;
}

function buildDonald() {
  const root = new THREE.Group();
  const skin = new THREE.MeshStandardMaterial({ color: 0xffc888, roughness: 0.7 });
  const suit = new THREE.MeshStandardMaterial({ color: 0x10183a, roughness: 0.6 });
  const shirt = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6 });
  const tie = new THREE.MeshStandardMaterial({ color: 0xc02020, roughness: 0.6 });
  const shoe = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.5 });
  const hairMat = new THREE.MeshStandardMaterial({ color: 0xd0a040, roughness: 0.8 });
  for (let i = 0; i < 2; i++) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.10, 0.9, 8), suit);
    leg.position.set(i ? 0.13 : -0.13, 0.45, 0);
    root.add(leg);
  }
  for (let i = 0; i < 2; i++) {
    const sh = new THREE.Mesh(new THREE.BoxGeometry(0.20, 0.08, 0.28), shoe);
    sh.position.set(i ? 0.13 : -0.13, 0.04, 0.04);
    root.add(sh);
  }
  // Torso
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 0.28), suit);
  torso.position.y = 1.15;
  torso.castShadow = true;
  root.add(torso);
  // Shirt
  const sh2 = new THREE.Mesh(new THREE.BoxGeometry(0.20, 0.55, 0.30), shirt);
  sh2.position.y = 1.18;
  root.add(sh2);
  // Tie
  const ti = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.45, 0.02), tie);
  ti.position.set(0, 1.05, 0.16);
  root.add(ti);
  // Belt
  const belt = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.05, 0.30), new THREE.MeshStandardMaterial({ color: 0x000000 }));
  belt.position.y = 0.93;
  root.add(belt);
  // Neck
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.10, 0.10, 8), skin);
  neck.position.y = 1.52;
  root.add(neck);
  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.16, 16, 12), skin);
  head.position.y = 1.72;
  head.castShadow = true;
  root.add(head);
  // Combover hair (a flat yellow sweep)
  const comb = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.10, 0.18), hairMat);
  comb.position.set(0.05, 1.84, 0.04);
  comb.rotation.z = 0.15;
  root.add(comb);
  // Eyes
  for (let i = 0; i < 2; i++) {
    const e = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 6), new THREE.MeshStandardMaterial({ color: 0x000000 }));
    e.position.set((i ? 0.05 : -0.05), 1.74, 0.155);
    root.add(e);
  }
  // Mouth
  const m = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.015, 0.02), new THREE.MeshStandardMaterial({ color: 0x802020 }));
  m.position.set(0, 1.66, 0.155);
  root.add(m);
  // Arms
  const arms = new THREE.Group();
  for (let i = 0; i < 2; i++) {
    const arm = new THREE.Group();
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.06, 0.45, 8), suit);
    upper.position.y = -0.20;
    arm.add(upper);
    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 6), skin);
    hand.position.y = -0.48;
    arm.add(hand);
    arm.position.set(i ? 0.30 : -0.30, 1.30, 0);
    arms.add(arm);
  }
  root.add(arms);
  root.userData.parts = { arms, head, torso };
  return root;
}

function buildElon() {
  const root = new THREE.Group();
  const skin = new THREE.MeshStandardMaterial({ color: 0xf0c8a0, roughness: 0.7 });
  const jacket = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.5 });
  const shirt = new THREE.MeshStandardMaterial({ color: 0x202020, roughness: 0.6 });
  const jeans = new THREE.MeshStandardMaterial({ color: 0x1a2050, roughness: 0.7 });
  const hairMat = new THREE.MeshStandardMaterial({ color: 0x3a2010, roughness: 0.9 });
  for (let i = 0; i < 2; i++) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.10, 0.9, 8), jeans);
    leg.position.set(i ? 0.13 : -0.13, 0.45, 0);
    root.add(leg);
  }
  for (let i = 0; i < 2; i++) {
    const sh = new THREE.Mesh(new THREE.BoxGeometry(0.20, 0.08, 0.28), new THREE.MeshStandardMaterial({ color: 0x101010 }));
    sh.position.set(i ? 0.13 : -0.13, 0.04, 0.04);
    root.add(sh);
  }
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 0.28), shirt);
  torso.position.y = 1.15;
  torso.castShadow = true;
  root.add(torso);
  const j = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.62, 0.30), jacket);
  j.position.y = 1.15;
  j.castShadow = true;
  root.add(j);
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.10, 0.10, 8), skin);
  neck.position.y = 1.52;
  root.add(neck);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.16, 16, 12), skin);
  head.position.y = 1.72;
  head.castShadow = true;
  root.add(head);
  // Receding hairline: small patch on top/back
  const hair = new THREE.Mesh(new THREE.SphereGeometry(0.165, 16, 12, 0, Math.PI*2, 0, Math.PI/2), hairMat);
  hair.position.y = 1.78;
  root.add(hair);
  // Eyes
  for (let i = 0; i < 2; i++) {
    const e = new THREE.Mesh(new THREE.SphereGeometry(0.022, 8, 6), new THREE.MeshStandardMaterial({ color: 0x000000 }));
    e.position.set((i ? 0.05 : -0.05), 1.74, 0.155);
    root.add(e);
  }
  // Slight smirk
  const m = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.012, 0.02), new THREE.MeshStandardMaterial({ color: 0x804040 }));
  m.position.set(0.005, 1.665, 0.155);
  root.add(m);
  const arms = new THREE.Group();
  for (let i = 0; i < 2; i++) {
    const arm = new THREE.Group();
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.06, 0.45, 8), jacket);
    upper.position.y = -0.20;
    arm.add(upper);
    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 6), skin);
    hand.position.y = -0.48;
    arm.add(hand);
    arm.position.set(i ? 0.30 : -0.30, 1.30, 0);
    arms.add(arm);
  }
  root.add(arms);
  root.userData.parts = { arms, head, torso };
  return root;
}

function buildZombie() {
  // Backup dancer: green zombie with tattered clothes
  const root = new THREE.Group();
  const skin = new THREE.MeshStandardMaterial({ color: 0x4a6a3a, roughness: 0.85 });
  for (let i = 0; i < 2; i++) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.10, 0.09, 0.9, 8), new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9 }));
    leg.position.set(i ? 0.13 : -0.13, 0.45, 0);
    root.add(leg);
  }
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 0.28), skin);
  torso.position.y = 1.15;
  torso.castShadow = true;
  root.add(torso);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.16, 16, 12), skin);
  head.position.y = 1.72;
  root.add(head);
  // Eye sockets
  for (let i = 0; i < 2; i++) {
    const e = new THREE.Mesh(new THREE.SphereGeometry(0.03, 8, 6), new THREE.MeshStandardMaterial({ color: 0x000000 }));
    e.position.set((i ? 0.05 : -0.05), 1.74, 0.14);
    root.add(e);
  }
  const arms = new THREE.Group();
  for (let i = 0; i < 2; i++) {
    const arm = new THREE.Group();
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.06, 0.50, 8), skin);
    upper.position.y = -0.22;
    arm.add(upper);
    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 6), skin);
    hand.position.y = -0.50;
    arm.add(hand);
    arm.position.set(i ? 0.30 : -0.30, 1.30, 0);
    arms.add(arm);
  }
  root.add(arms);
  root.userData.parts = { arms, head, torso };
  return root;
}

// ---------- Place characters ----------
const positions = [
  { build: buildMichael, x:  0.0, z:  0.0, role: 'lead' },
  { build: buildPepe,    x: -1.3, z:  0.0, role: 'support' },
  { build: buildDonald,  x:  1.3, z:  0.0, role: 'support' },
  { build: buildElon,    x:  0.0, z:  1.2, role: 'support' },
];
const characters = positions.map((p, i) => {
  const m = p.build();
  m.position.set(p.x, 0, p.z);
  m.castShadow = true;
  scene.add(m);
  return { obj: m, role: p.role, offset: i * 0.4 };
});
// Backup zombies
for (let i = 0; i < 8; i++) {
  const a = (i / 8) * Math.PI * 2;
  const z = buildZombie();
  z.position.set(Math.cos(a) * 2.5, 0, Math.sin(a) * 2.5 + 1.2);
  z.castShadow = true;
  scene.add(z);
  characters.push({ obj: z, role: 'backup', offset: i * 0.2 });
}

// ---------- Choreography ----------
// 7 pose keyframes, each with limb rotations and a 32s loop
const poses = [
  // 0: idle — arms slightly out
  { name: 'Idle', dur: 4,
    arms: { l: [0, 0.3, 0], r: [0, -0.3, 0] },
    torso: [0, 0, 0], head: [0, 0, 0], bob: 0,
  },
  // 1: zombie stomp — both arms forward and rigid
  { name: 'Zombie Stomp', dur: 4,
    arms: { l: [0, 0, -1.6], r: [0, 0, -1.6] },
    torso: [0.1, 0, 0], head: [-0.15, 0, 0], bob: -0.05,
  },
  // 2: shuffle right — right arm crosses, left out
  { name: 'Shuffle R', dur: 4,
    arms: { l: [0.3, 0.6, 0], r: [-0.3, -0.6, 0] },
    torso: [0, 0.2, 0], head: [0, -0.3, 0], bob: 0.02,
  },
  // 3: shuffle left — mirror
  { name: 'Shuffle L', dur: 4,
    arms: { l: [-0.3, -0.6, 0], r: [0.3, 0.6, 0] },
    torso: [0, -0.2, 0], head: [0, 0.3, 0], bob: 0.02,
  },
  // 4: arms up lunge
  { name: 'Arms-Up Lunge', dur: 5,
    arms: { l: [0, 0, -2.6], r: [0, 0, -2.6] },
    torso: [-0.1, 0, 0], head: [0.15, 0, 0], bob: 0.08,
  },
  // 5: claw hands — elbows bent, hands in front
  { name: 'Claw Hands', dur: 6,
    arms: { l: [-0.6, 0, -1.2], r: [0.6, 0, -1.2] },
    torso: [0.05, 0, 0], head: [0.05, 0, 0], bob: 0.0,
  },
  // 6: settle & bow
  { name: 'Settle-Bow', dur: 5,
    arms: { l: [0.4, 0.3, 0], r: [-0.4, -0.3, 0] },
    torso: [0.25, 0, 0], head: [0.4, 0, 0], bob: -0.05,
  },
];
const totalDur = poses.reduce((s, p) => s + p.dur, 0);
function poseAt(t) {
  let acc = 0;
  for (let i = 0; i < poses.length; i++) {
    if (t < acc + poses[i].dur) {
      const u = (t - acc) / poses[i].dur;
      const a = poses[i], b = poses[(i + 1) % poses.length];
      return { u, a, b, idx: i };
    }
    acc += poses[i].dur;
  }
  return { u: 0, a: poses[0], b: poses[1], idx: 0 };
}
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpArr(a, b, t) { return [lerp(a[0],b[0],t), lerp(a[1],b[1],t), lerp(a[2],b[2],t)]; }
function applyPose(charObj, pose, lerpT, timeSeed) {
  const a = pose.a, b = pose.b;
  const armsL = lerpArr(a.arms.l, b.arms.l, lerpT);
  const armsR = lerpArr(a.arms.r, b.arms.r, lerpT);
  const torso = lerpArr(a.torso, b.torso, lerpT);
  const head  = lerpArr(a.head, b.head, lerpT);
  const bob   = lerp(a.bob, b.bob, lerpT);
  // Slight extra noise so the backup zombies feel like individuals
  const jitter = Math.sin(timeSeed * 4) * 0.05;
  const parts = charObj.userData.parts;
  if (parts.arms) {
    parts.arms.children[0].rotation.set(armsL[0] + jitter, armsL[1], armsL[2]);
    parts.arms.children[1].rotation.set(armsR[0] - jitter, armsR[1], armsR[2]);
  }
  if (parts.torso) parts.torso.rotation.set(torso[0], torso[1], torso[2]);
  if (parts.head)  parts.head.rotation.set(head[0] + jitter * 0.5, head[1], head[2]);
  charObj.position.y = bob;
}

// ---------- Postprocessing ----------
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.7, 0.4, 0.85);
composer.addPass(bloom);
const fxaa = new ShaderPass(FXAAShader);
fxaa.material.uniforms['resolution'].value.set(1 / window.innerWidth, 1 / window.innerHeight);
composer.addPass(fxaa);

// ---------- Camera modes ----------
const camModes = ['Front', 'Orbit', 'Low', 'Crane'];
let camMode = 'Front';
const camButtons = [document.getElementById('camFront'), document.getElementById('camOrbit'), document.getElementById('camLow'), document.getElementById('camCrane')];
camButtons.forEach((b, i) => {
  b.addEventListener('click', () => {
    camMode = camModes[i];
    camButtons.forEach(x => x.classList.remove('active'));
    b.classList.add('active');
  });
});

let playing = true;
document.getElementById('playBtn').addEventListener('click', () => {
  playing = !playing;
  document.getElementById('playBtn').textContent = playing ? '⏸ Pause' : '⏵ Play';
});
document.getElementById('fogToggle').addEventListener('change', (e) => {
  scene.fog = e.target.checked ? new THREE.FogExp2(0x0a0020, 0.035) : null;
});
document.getElementById('spotToggle').addEventListener('change', (e) => {
  spots.forEach(s => s.visible = e.target.checked);
});

// ---------- Resize ----------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  fxaa.material.uniforms['resolution'].value.set(1 / window.innerWidth, 1 / window.innerHeight);
});

// ---------- Animate ----------
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  // Choreography
  if (playing) {
    const tt = t % totalDur;
    const p = poseAt(tt);
    characters.forEach((c, i) => {
      const offsetT = (t + c.offset) % totalDur;
      const pp = poseAt(offsetT);
      applyPose(c.obj, pp, easeInOut(pp.u), t * 0.5 + i);
    });
  }
  // Fog drift
  {
    const arr = fogParticles.pts.geometry.attributes.position.array;
    for (let i = 0; i < arr.length / 3; i++) {
      arr[i*3+1] += fogParticles.vel[i] * 0.016;
      if (arr[i*3+1] > 6) {
        arr[i*3]   = (Math.random() - 0.5) * 14;
        arr[i*3+1] = 0;
        arr[i*3+2] = (Math.random() - 0.5) * 14;
      }
    }
    fogParticles.pts.geometry.attributes.position.needsUpdate = true;
  }
  // Stage ring pulse
  ring.material.opacity = 0.5 + Math.sin(t * 2) * 0.25;
  // Camera
  switch (camMode) {
    case 'Front': {
      const bob = Math.sin(t * 0.4) * 0.05;
      camera.position.set(0, 1.7 + bob, 7);
      camera.lookAt(0, 1.2, 0);
      break;
    }
    case 'Orbit': {
      const a = t * 0.25;
      camera.position.set(Math.sin(a) * 6, 2.2, Math.cos(a) * 6);
      camera.lookAt(0, 1.2, 0);
      break;
    }
    case 'Low': {
      camera.position.set(0, 0.5, 5);
      camera.lookAt(0, 1.4, 0);
      break;
    }
    case 'Crane': {
      const h = 4 + Math.sin(t * 0.3) * 1.5;
      camera.position.set(0, h, 4);
      camera.lookAt(0, 1.2, 0);
      break;
    }
  }
  // Spotlight sweep
  spots.forEach((s, i) => {
    s.target.position.set(
      Math.cos(t * 0.6 + i) * 1.2,
      0.4 + Math.sin(t * 0.8 + i) * 0.2,
      Math.sin(t * 0.6 + i) * 1.2
    );
  });
  composer.render();
}
function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }
animate();
</script>
</body>
