<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thriller - Three.js</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{overflow:hidden;background:#000}</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x1a0a2e);
scene.fog=new THREE.FogExp2(0x1a0a2e,0.015);

const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,3,12);camera.lookAt(0,1,0);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);

// Lights
const ambient=new THREE.AmbientLight(0x404060,0.5);scene.add(ambient);
const dirLight=new THREE.DirectionalLight(0xffa726,1.2);dirLight.position.set(5,8,3);dirLight.castShadow=true;scene.add(dirLight);
const spotL=new THREE.SpotLight(0xff4444,2,30,Math.PI/4);spotL.position.set(-5,10,0);scene.add(spotL);
const spotR=new THREE.SpotLight(0x44ff44,2,30,Math.PI/4);spotR.position.set(5,10,0);scene.add(spotR);

// Ground
const groundGeo=new THREE.PlaneGeometry(60,60);
const groundMat=new THREE.MeshStandardMaterial({color:0x2d2d2d,roughness:0.8});
const ground=new THREE.Mesh(groundGeo,groundMat);ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);

// Create character from primitives
function createCharacter(color,name){
  const group=new THREE.Group();group.userData={name};
  // Body
  const bodyGeo=new THREE.CylinderGeometry(0.3,0.35,1.2,8);
  const bodyMat=new THREE.MeshStandardMaterial({color});
  const body=new THREE.Mesh(bodyGeo,bodyMat);body.position.y=1;body.castShadow=true;group.add(body);
  // Head
  const headGeo=new THREE.SphereGeometry(0.35,16,16);
  const headMat=new THREE.MeshStandardMaterial({color:0xffcc99});
  const head=new THREE.Mesh(headGeo,headMat);head.position.y=1.8;head.castShadow=true;group.add(head);
  // Arms
  for(let side of[-1,1]){
    const armGeo=new THREE.CylinderGeometry(0.06,0.06,0.9,6);
    const arm=new THREE.Mesh(armGeo,bodyMat);arm.position.set(side*0.45,1.2,0);arm.rotation.z=side*0.3;arm.castShadow=true;group.add(arm);
  }
  // Legs
  for(let side of[-1,1]){
    const legGeo=new THREE.CylinderGeometry(0.08,0.07,0.9,6);
    const leg=new THREE.Mesh(legGeo,bodyMat);leg.position.set(side*0.15,0.3,0);leg.castShadow=true;group.add(leg);
  }
  return group;
}

const mj=createCharacter(0x212121,'MJ');mj.position.set(-4,0,-2);scene.add(mj);
const pepe=createCharacter(0x4caf50,'Pepe');pepe.position.set(-1.5,0,-1);scene.add(pepe);
const trump=createCharacter(0xffeb3b,'Trump');trump.position.set(1.5,0,-1);scene.add(trump);
const musk=createCharacter(0x42a5f5,'Musk');musk.position.set(4,0,-2);scene.add(musk);

// MJ hat
const hatGeo=new THREE.CylinderGeometry(0.38,0.38,0.15,16);
const hatMat=new THREE.MeshStandardMaterial({color:0x1a1a1a});
const hat=new THREE.Mesh(hatGeo,hatMat);hat.position.set(-4,2.1,-2);scene.add(hat);

// Trump hair (golden sphere on top)
const hairGeo=new THREE.SphereGeometry(0.38,16,16);
hairGeo.scale(1,0.7,1);
const hairMat=new THREE.MeshStandardMaterial({color:0xffd54f});
const hair=new THREE.Mesh(hairGeo,hairMat);hair.position.set(1.5,2.1,-1);scene.add(hair);

// Pepe eyes (green circles)
for(let side of[-1,1]){
  const eyeGeo=new THREE.SphereGeometry(0.08,8,8);
  const eyeMat=new THREE.MeshStandardMaterial({color:0xffffff});
  const eye=new THREE.Mesh(eyeGeo,eyeMat);eye.position.set(-1.5+side*0.12,1.85,-0.95);scene.add(eye);
}

// Particles (dust/atmosphere)
const particleCount=500;
const pGeo=new THREE.BufferGeometry();
const positions=new Float32Array(particleCount*3);
for(let i=0;i<particleCount;i++){positions[i*3]=(Math.random()-0.5)*40;positions[i*3+1]=Math.random()*8;positions[i*3+2]=(Math.random()-0.5)*40;}
pGeo.setAttribute('position',new THREE.BufferAttribute(positions,3));
const pMat=new THREE.PointsMaterial({color:0xffa726,size:0.08,transparent:true,opacity:0.6});
const particles=new THREE.Points(pGeo,pMat);scene.add(particles);

// Thriller dance animation
const characters=[mj,pepe,trump,musk];
let time=0;

function animate(){
  requestAnimationFrame(animate);
  time+=0.016;

  // Dance moves
  characters.forEach((c,i)=>{
    const phase=time*2+i*Math.PI/2;
    // Body sway
    c.rotation.y=Math.sin(phase)*0.4;
    c.position.x=c.userData.baseX||c.position.x;
    if(!c.userData.baseX)c.userData.baseX=c.position.x;
    c.position.z=-2+Math.sin(phase*1.5)*0.3;
    // Jump
    const jump=Math.max(0,Math.sin(time*4+i))*0.3;
    c.position.y=jump;
  });

  // MJ spin occasionally
  if(Math.sin(time)>0.9)mj.rotation.y+=0.15;

  // Camera orbit
  camera.position.x=Math.sin(time*0.2)*8;
  camera.position.z=Math.cos(time*0.2)*12+4;
  camera.lookAt(0,1,-1);

  // Spotlight sweep
  spotL.position.x=-5+Math.sin(time*0.5)*3;
  spotR.position.x=5-Math.sin(time*0.5)*3;

  // Particles float
  const posArr=pGeo.attributes.position.array;
  for(let i=0;i<particleCount;i++){
    posArr[i*3+1]+=Math.sin(time+i)*0.002;
    if(posArr[i*3+1]>8)posArr[i*3+1]=0;
  }
  pGeo.attributes.position.needsUpdate=true;

  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
