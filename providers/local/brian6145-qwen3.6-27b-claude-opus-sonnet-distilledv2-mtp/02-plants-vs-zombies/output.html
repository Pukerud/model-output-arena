<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>PVZ Mini</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:#1a472a;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;user-select:none}#menu,#game,#leaderboard{display:none;width:min(800px,95vw)}#menu{text-align:center}.title{font-size:2.6em;margin-bottom:8px;color:#7fff00;text-shadow:0 0 14px #3a7a00}.subtitle{margin-bottom:28px;font-size:.95em;opacity:.8}button{background:#4caf50;border:none;padding:14px 28px;margin:6px;font-size:1.1em;color:#fff;border-radius:8px;cursor:pointer;transition:.15s}.title-btn:hover{background:#66bb6a;transform:scale(1.04)}#game{position:relative}canvas{border:3px solid #2e7d32;border-radius:8px;display:block;width:100%;height:auto}#hud{display:flex;justify-content:space-between;padding:8px;background:#2e7d32;border-radius:6px;margin-bottom:8px;font-size:.95em}#leaderboard table{width:100%;border-collapse:collapse;text-align:center}.back-btn{margin-top:12px;background:#555}.scores tr:nth-child(odd){background:rgba(255,255,255,.06)}.scores th,.scores td{padding:6px 10px}</style></head><body>
<div id="menu"><h1 class="title">Plants vs Zombies</h1><p class="subtitle">Mini arcade version — defend your lawn!</p><button onclick="startGame()">Play</button><br><button onclick="showLeaderboard()">Leaderboard</button></div>
<div id="game"><div id="hud"><span id="scoreDisplay">Score: 0</span><span id="waveDisplay">Wave: 1</span><span id="livesDisplay">Lives: 3</span></div><canvas id="g" width="800" height="560"></canvas></div>
<div id="leaderboard"><h2 style="text-align:center;margin-bottom:14px"># Leaderboard #</h2><table class="scores"><thead><tr><th>#</th><th>Name</th><th>Score</th></tr></thead><tbody id="scoreRows"></tbody></table><br><button class="back-btn" onclick="showMenu()">Back to Menu</button></div>
<script>const MENU=document.getElementById('menu'),GAME=document.getElementById('game'),LB=document.getElementById('leaderboard');function showMenu(){MENU.style.display='block';GAME.style.display='none';LB.style.display='none'}function startGame(){showMenu();GAME.style.display='block';init()}function showLeaderboard(){MENU.style.display='none';GAME.style.display='none';LB.style.display='block';renderScores()}
// ── game state ──const cv=document.getElementById('g'),cx=cv.getContext('2d');let plants=[],zombies=[],bullets=[],score=0,wave=1,lives=3,spawnT=0,active=false;function init(){plants=[];zombies=[];bullets=[];score=0;wave=1;lives=3;spawnT=0;updateHUD();active=true;requestAnimationFrame(loop)}
// ── draw helpers ──function rect(x,y,w,h,c){cx.fillStyle=c;cx.fillRect(x,y,w,h)}function circ(px,py,r,c){cx.beginPath();cx.arc(px,py,r,0,Math.PI*2);cx.fillStyle=c;cx.fill()}
// ── plants (sunflowers) ──class Plant{constructor(col,row){this.col=col;this.row=row;this.x=60+col*100-25;this.y=30+row*95-20;this.health=100}draw(){// stemrect(this.x+21,this.y+24,8,36,'#2e7d32');// floretsfor(let i=0;i<8;i++){const a=i/8*Math.PI*2,cx2=this.x+25,cy=this.y+22;circ(cx2+Math.cos(a)*14,cy+Math.sin(a)*14,6,'#ffeb3b');}// headcirc(this.x+25,this.y+22,9,'#f57c00')}update(dt){}}
// ── zombies ──class Zombie{constructor(){this.col=Math.floor(Math.random()*6);this.row=Math.floor(Math.random()*4);this.x=cv.width;this.y=30+this.row*95-18;this.speed=.3+Math.random()*.2;this.health=50}draw(){circ(this.x,this.y,16,'#7cfc00');rect(this.x-10,this.y+14,20,22,'#4a6b4f');circ(this.x-4,this.y-3,2.5,'#000');circ(this.x+4,this.y-3,2.5,'#000')}update(dt){this.x-=this.speed;if(this.x<0){lives--;this.health=0}}}
// ── bullets ──class Bullet{constructor(x,y,row){this.x=x;this.y=y;this.row=row;this.speed=4}draw(){circ(this.x,this.y,3,'#ffeb3b')}update(dt){this.x+=this.speed}}
// ── HUD ──function updateHUD(){document.getElementById('scoreDisplay').textContent='Score: '+score;document.getElementById('waveDisplay').textContent='Wave: '+wave;document.getElementById('livesDisplay').textContent='Lives: '+lives}
// ── main loop ──let last=performance.now();function loop(now){const dt=(now-last)/16.67;last=now;if(!active)return;// spawn zombiesspawnT+=dt;if(spawnT>90-wave*4){zombies.push(new Zombie());spawnT=0}// update zombieszombies.forEach(z=>z.update(dt));bullets.forEach(b=>b.update(dt));// collisionszombies.forEach(z=>{if(z.health<=0)return;bullets.forEach(b=>{if(Math.hypot(b.x-z.x,b.y-z.y)<18){z.health-=25;b.speed=9e3;if(z.health<=0){score+=50;z.col=-1}}});// eat plantplants.forEach(p=>{if(p.row===z.row&&p.col===z.col&&Math.abs(p.x+25-z.x)<22){p.health-=dt*8}})});plants=plants.filter(p=>p.health>0);zombies=zombies.filter(z=>z.health>0);bullets=bullets.filter(b=>b.x<cv.width);// shoot logic (auto-fire every 60 ticks)if(Math.floor(now/100)%40===0){plants.forEach(p=>{const t=zombies.find(z=>z.row===p.row&&Math.abs(z.x-p.x-25)<120);if(t)bullets.push(new Bullet(p.x+38,p.y+22,p.row))}}// drawcx.clearRect(0,0,cv.width,cv.height);// lawnsfor(let r=0;r<4;r++){const yy=30+r*95;rect(0,yy-10,cv.width,95,r%2?'#2e7d32':'#388e3c');}// gridlinescx.strokeStyle='rgba(0,0,0,.1)';for(let c=0;c<6;c++){cx.beginPath();cx.moveTo(60+c*100,0);cx.lineTo(60+c*100,cv.height);cx.stroke();}plants.forEach(p=>p.draw());zombies.forEach(z=>z.draw());bullets.forEach(b=>b.draw());updateHUD();requestAnimationFrame(loop)}
// ── click to plant sunflower ──cv.addEventListener('click',e=>{const r=cv.getBoundingClientRect(),scX=(e.clientX-r.left)/r.width*800,scY=(e.clientY-r.top)/r.height*560;if(scY<30||scY>520)return;const row=Math.floor((scY-10)/95);if(row<0||row>3)return;const col=Math.floor((scX-40)/100);if(col<0||col>5)return;if(!plants.find(p=>p.col===col&&p.row===row))plants.push(new Plant(col,row))});
// ── leaderboard (localStorage) ──function getScores(){try{return JSON.parse(localStorage.getItem('pvz_scores'))||[]}catch(e){return[]}}function addScore(s){const s2=getScores();s2.push({name:'Player',score:s});s2.sort((a,b)=>b.score-a.score);s2.splice(10);localStorage.setItem('pvz_scores',JSON.stringify(s2))}function renderScores(){const r=document.getElementById('scoreRows');r.innerHTML='';getScores().forEach((s,i)=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${i+1}</td><td>${s.name}</td><td>${s.score}</td>`;r.appendChild(tr)})}// game over handler (simple)setInterval(()=>{if(active&&lives<=0){active=false;lives=0;addScore(score);alert('Game Over! Score: '+score)}},250);
showMenu();</script></body></html>
