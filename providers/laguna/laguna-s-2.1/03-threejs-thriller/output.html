<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laguna S 2.1 - Three.js Thriller Dance Scene</title>
    <style>body { margin: 0; overflow: hidden; background: #000; } canvas { display: block; }</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.min.js"></script>
<script>

// === Scene Setup ===
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.0035);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 4, 18);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// === Lighting ===
const keyLight = new THREE.DirectionalLight(0xffffff, 2.5);
keyLight.position.set(10, 20, 15);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x8ec1ff, 0.6);
fillLight.position.set(-5, 3, -2);
scene.add(fillLight);

// Rim/back lights for dramatic silhouette effect
for (let i = 0; i < 4; i++) {
    const rimLight = new THREE.PointLight(0xff6b6b, 1.2, 25);
    rimLight.position.set(Math.cos(i * Math.PI / 2) * 12, 8, Math.sin(i * Math.PI / 2) * 12);
    scene.add(rimLight);
}

// Atmospheric fog particles for cinematic effect
for (let i = 0; i < 300; i++) {
    const particleGeometry = new THREE.SphereGeometry(0.15, 6, 6);
    const color = Math.random() > 0.7 ? 0xff6b6b : 0x8ec1ff;
    const particleMaterial = new THREE.MeshBasicMaterial({ color: color });
    const particle = new THREE.Mesh(particleGeometry, particleMaterial);
    particle.position.set(
        (Math.random() - 0.5) * 60,
        Math.random() * 20 + 5,
        (Math.random() - 0.5) * 30
    );
    scene.add(particle);
}

// === Ground / Stage with checkerboard dancefloor pattern ===
const checkerSize = 2;
for (let i = 0; i < 15; i++) {
    for (let j = 0; j < 15; j++) {
        const geo = new THREE.BoxGeometry(checkerSize, 0.1, checkerSize);
        const isDark = (i + j) % 2 === 0;
        const mat = new THREE.MeshStandardMaterial({ color: isDark ? 0x2a2a4a : 0x3d3d6b });
        const tile = new THREE.Mesh(geo, mat);
        tile.position.set((i - 7) * checkerSize + checkerSize / 2, 0.01, (j - 7) * checkerSize + checkerSize / 2);
        scene.add(tile);
    }
}

// === Helper functions ===
function rand(min, max) { return Math.random() * (max - min) + min; }
function degToRad(degrees) { return degrees * Math.PI / 180; }

class Limb {
    constructor(geometry, material, position, rotation, scale) {
        this.mesh = new THREE.Mesh(geometry, material);
        if (position) this.mesh.position.copy(position);
        if (rotation) this.mesh.rotation.set(rotation.x || 0, rotation.y || 0, rotation.z || 0);
        if (scale) this.mesh.scale.set(scale.x || 1, scale.y || 1, scale.z || 1);
    }

    addTo(parent) { parent.add(this.mesh); return this; }
    setRotation(x, y, z) { this.mesh.rotation.set(x, y, z); }
}

// === Character Creator Function ===
function createCharacter(config) {
    const group = new THREE.Group();

    // Body parts geometry
    const headGeo = new THREE.SphereGeometry(config.headRadius || 0.6, 16, 16);
    const bodyGeo = new THREE.CylinderGeometry(0.4, 0.5, 1.2, 8);
    const armGeo = new THREE.CylinderGeometry(0.25, 0.25, config.armLength || 1.4, 6);
    const legGeo = new THREE.CylinderGeometry(0.3, 0.25, config.legLength || 1.6, 6);

    // Materials per character
    const headMat = new THREE.MeshStandardMaterial({ color: config.skinColor });
    const bodyMat = new THREE.MeshStandardMaterial({ color: config.bodyColor });
    const detailMat = new THREE.MeshStandardMaterial({ color: config.detailColor });

    // Head
    const headLimb = new Limb(headGeo, headMat, new THREE.Vector3(0, 1.8, 0));
    group.add(headLimb.mesh);

    // Body (torso) - tapered cylinder for realistic shape
    const bodyLimb = new Limb(bodyGeo, bodyMat, new THREE.Vector3(0, 0.9, 0), {x: Math.PI / 8});
    group.add(bodyLimb.mesh);

    // Arms with slight outward angle at shoulders (dance pose ready)
    const leftArmPos = new THREE.Vector3(-0.65, 1.2, 0);
    const rightArmPos = new THREE.Vector3(0.65, 1.2, 0);
    const leftArmRot = {z: degToRad(45)};
    const rightArmRot = {z: degToRad(-45)};

    const leftArmLimb = new Limb(armGeo, bodyMat, leftArmPos, leftArmRot);
    group.add(leftArmLimb.mesh);

    const rightArmLimb = new Limb(armGeo, bodyMat, rightArmPos, rightArmRot);
    group.add(rightArmLimb.mesh);

    // Legs (slightly apart stance)
    const leftLegLimb = new Limb(legGeo, detailMat, new THREE.Vector3(-0.25, -0.6, 0));
    group.add(leftLegLimb.mesh);
    const rightLegLimb = new Limb(legGeo, detailMat, new THREE.Vector3(0.25, -0.6, 0));
    group.add(rightLegLimb.mesh);

    // Character-specific accessories
    if (config.type === 'michael') createMichaelAccessories(group);
    else if (config.type === 'pepe') createPepeDetails(group);
    else if (config.type === 'trump') createTrumpDetails(group);
    else if (config.type === 'elon') createElonDetails(group);

    return {
        group: group,
        head: headLimb.mesh, body: bodyLimb.mesh,
        leftArm: leftArmLimb.mesh, rightArm: rightArmLimb.mesh,
        leftLeg: leftLegLimb.mesh, rightLeg: rightLegLimb.mesh,
        config: config, animTimeOffset: Math.random() * Math.PI * 2
    };
}

function createMichaelAccessories(group) {
    // Red leather jacket with white collar and glove
    const jacketGeo = new THREE.CylinderGeometry(0.45, 0.6, 1.3, 8);
    const jacketMat = new THREE.MeshStandardMaterial({ color: 0xcc1122 });
    const jacket = new Limb(jacketGeo, jacketMat, new THREE.Vector3(0, -0.2, 0)); group.add(jacket.mesh);

    // White collar detail (band around neck)
    const collarGeo = new THREE.TorusGeometry(0.5, 0.08, 4, 12);
    const collarMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const collar = new Limb(collarGeo, collarMat, null, {x: Math.PI / 2}); group.add(collar.mesh);

    // White glove on right hand (positioned to match arm angle)
    const gloveGeo = new THREE.SphereGeometry(0.35, 8, 8);
    const gloveMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const glovePos = new THREE.Vector3(1.2 + Math.sin(degToRad(-45)) * 0.7, 1.2 - Math.cos(degToRad(-45)) * 0.7, 0);
    const rightGlove = new Limb(gloveGeo, gloveMat, glovePos); group.add(rightGlove.mesh);

    // Black fedora hat with thin band
    const hatTopGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.15, 16);
    const brimGeo = new THREE.TorusGeometry(0.7, 0.08, 4, 16);
    const darkMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e });
    const brownMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });

    const hatTop = new Limb(hatTopGeo, darkMat, new THREE.Vector3(0, 2.35, 0)); group.add(hatTop.mesh);
    const brim = new Limb(brimGeo, brownMat, null, {x: Math.PI / 2}); brim.mesh.position.y = 2.25; group.add(brim.mesh);

    // Moonwalker boots (black rectangles at feet)
    const bootGeo = new THREE.BoxGeometry(0.5, 0.3, 0.7);
    for (let i = 0; i < 2; i++) {
        const bootLimb = new Limb(bootGeo, darkMat, new THREE.Vector3(i === 0 ? -0.3 : 0.3, -1.45, 0));
        group.add(bootLimb.mesh);
    }
}

function createPepeDetails(group) {
    // Eyes (white outer + black pupil) - Pepe signature wide-set eyes
    const eyeGeo = new THREE.SphereGeometry(0.2, 16, 16);
    const pupilGeo = new THREE.SphereGeometry(0.08, 16, 16);

    for (let side of [-1, 1]) {
        // White eye base
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const eyePos = new THREE.Vector3(side * 0.25, 0.3, 0.5);
        const eyeLimb = new Limb(eyeGeo, eyeMat, eyePos); group.add(eyeLimb.mesh);

        // Black pupil (slightly inset)
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const pupilPos = new THREE.Vector3(side * 0.25, 0.3, 0.68);
        const pupilLimb = new Limb(pupilGeo, pupilMat, pupilPos, null, {x: 1.2}); group.add(pupilLimb.mesh);
    }

    // Big mouth (wide grin typical of Pepe)
    const mouthGeo = new THREE.TorusGeometry(0.4, 0.05, 4, 16);
    const mouthMat = new THREE.MeshStandardMaterial({ color: 0xff4d4d });
    const mouthLimb = new Limb(mouthGeo, mouthMat, new THREE.Vector3(0, -0.2, 0)); group.add(mouthLimb.mesh);
}

function createTrumpDetails(group) {
    // Trump: blue tie, golden hair quiff, red MAGA cap
    const tieGeo = new THREE.CylinderGeometry(0.15, 0.12, 1.0, 6);
    const tieMat = new THREE.MeshStandardMaterial({ color: 0x1e3a8a }); // dark blue tie
    const tieLimb = new Limb(tieGeo, tieMat, new THREE.Vector3(0, -0.4, 0.55)); group.add(tieLimb.mesh);

    // Golden hair (spiky texture)
    const hairGeo = new THREE.SphereGeometry(0.65, 8, 8);
    const hairMat = new THREE.MeshStandardMaterial({ color: 0xd4af37 });
    const hairLimb = new Limb(hairGeo, hairMat, new THREE.Vector3(0, 1.9, 0), null, {x: 1.2}); group.add(hairLimb.mesh);

    // Red "Make America Great Again" cap
    const capGeo = new THREE.CylinderGeometry(0.65, 0.7, 0.15, 16);
    const capMat = new THREE.MeshStandardMaterial({ color: 0xcc1122 });
    const capLimb = new Limb(capGeo, capMat, new THREE.Vector3(0, 2.35, 0)); group.add(capLimb.mesh);

    // Hands (pointing gesture - Trump's signature)
    const handGeo = new THREE.SphereGeometry(0.3, 8, 8);
    const handMat = new THREE.MeshStandardMaterial({ color: 0xFDBCB6 }); // skin tone-ish
    for (let i = 0; i < 2; i++) {
        const side = i === 0 ? -1 : 1;
        const handLimb = new Limb(handGeo, handMat, new THREE.Vector3(side * 0.9, 1.4, 0)); group.add(handLimb.mesh);
    }
}

function createElonDetails(group) {
    // Elon Musk: SpaceX-style suit with white/grey color scheme and black visor

    // White space suit base layer overlay on torso
    const suitGeo = new THREE.CylinderGeometry(0.45, 0.55, 1.3, 8);
    const suitMat = new THREE.MeshStandardMaterial({ color: 0xe0e0e0 }); // white/grey suit
    const suitLimb = new Limb(suitGeo, suitMat, null); group.add(suitLimb.mesh);

    // Black visor (semi-transparent) covering eyes area on helmet
    const visorGeo = new THREE.CylinderGeometry(0.25, 0.25, 1.4, 8);
    const visorMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
    const visLimb = new Limb(visorGeo, visorMat, null, {z: Math.PI / 2}, {x: 1.4}); group.add(visLimb.mesh);

    // Orange-red SpaceX-style chest emblem
    const emblemGeo = new THREE.TorusGeometry(0.35, 0.06, 4, 20);
    const emblemMat = new THREE.MeshStandardMaterial({ color: 0xff6b35 });
    const emblemLimb = new Limb(emblemGeo, emblemMat, null); group.add(emblemLimb.mesh);

    // White boots at feet
    const bootGeo = new THREE.BoxGeometry(0.5, 0.3, 0.7);
    for (let i = 0; i < 2; i++) {
        const side = i === 0 ? -1 : 1;
        const bootLimb = new Limb(bootGeo, suitMat, new THREE.Vector3(side * 0.3, -1.45, 0)); group.add(bootLimb.mesh);
    }
}

// === Character configurations ===
const CHARACTER_CONFIGS = [
    { type: 'michael', name: 'Michael Jackson', skinColor: 0xFDBCB6, bodyColor: 0xcc1122, detailColor: 0x1a1a2e },
    { type: 'pepe',    name: 'Pepe the Frog',   skinColor: 0xa8d95b, bodyColor: 0xcce473, detailColor: 0xffcc00 },
    { type: 'trump',   name: 'Donald Trump',   skinColor: 0xFDBCB6, bodyColor: 0x1e3a8a, detailColor: 0xd4af37 },
    { type: 'elon',    name: 'Elon Musk',      skinColor: 0xFDBCB6, bodyColor: 0xe0e0e0, detailColor: 0xffffff }
];

// Create all four characters spaced across the stage in a dance formation
const characters = [];
for (let i = 0; i < CHARACTER_CONFIGS.length; i++) {
    const cfg = Object.assign({}, CHARACTER_CONFIGS[i]); // copy so we can add defaults safely
    if (!cfg.headRadius)   cfg.headRadius = 0.6;
    if (!cfg.armLength)    cfg.armLength = 1.4;
    if (!cfg.legLength)    cfg.legLength = 1.6;

    const char = createCharacter(cfg);
    // Space characters evenly across stage (x-axis), alternating z for depth formation
    char.group.position.x = (i - 1.5) * 4.5;
    char.group.position.z = i % 2 === 0 ? 3 : -3;
    scene.add(char.group);
    characters.push(char);
}

// === Animation Loop ===
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const elapsed = clock.getElapsedTime();

    // Rotate camera slowly around the dance floor for cinematic view
    camera.position.x = Math.sin(elapsed * 0.1) * 22;
    camera.position.z = Math.cos(elapsed * 0.1) * 22;
    camera.lookAt(0, 1, 0);

    // Animate each character with Thriller-style choreography
    characters.forEach((char, idx) => {
        const t = elapsed + char.animTimeOffset;
        switch(idx) {
            case 0: animateMichaelJackson(char, t); break;
            case 1: animatePepe(char, t);           break;
            case 2: animateTrump(char, t);          break;
            case 3: animateElon(char, t);           break;
        }

        // Slight bounce on all characters to simulate dancing motion
        const bounce = Math.sin(t * 8) * 0.05;
        char.group.position.y += (bounce - (char.group.position.y > 0 ? 0 : 0)) % 1 === 0 ? bounce : 0;

        // Gentle floating rotation for visual interest
        const floatRot = Math.sin(t * 0.7) * 0.05;
        char.head.rotation.y += floatRot * 0.016;
    });

    renderer.render(scene, camera);
}

// === Per-character animation functions ===
function animateMichaelJackson(char, t) {
    // Classic Thriller moves: arm waves, moonwalk prep stance, hat tip
    const waveSpeed = 4;
    char.leftArm.rotation.z = degToRad(30) + Math.sin(t * waveSpeed) * degToRad(60);
    char.rightArm.rotation.z = degToRad(-30) - Math.sin(t * waveSpeed) * degToRad(60);

    // Head tilt side to side during chorus
    char.head.rotation.x = Math.sin(t * 2) * degToRad(15);
    char.head.rotation.y += Math.cos(t * 1.5) * degToRad(0.5);

    // Legs: slight bounce simulating moonwalk prep
    const legBounce = Math.abs(Math.sin(t * waveSpeed)) * degToRad(8);
    char.leftLeg.rotation.x = -legBounce;
    char.rightLeg.rotation.x = -legBounce;
}

function animatePepe(char, t) {
    // Pepe dances with exaggerated frog-like movements: arms flail, head bobs
    const wiggleFreq = 3.5;
    char.leftArm.rotation.z = degToRad(10) + Math.sin(t * wiggleFreq) * degToRad(90);
    char.rightArm.rotation.z = degToRad(-10) - Math.sin(t * wiggleFreq) * degToRad(90);

    // Frog leg kicks (alternating)
    const kickAmp = 2.5;
    char.leftLeg.rotation.x = Math.sin(t * kickAmp) * degToRad(30);
    char.rightLeg.rotation.x = -Math.sin(t * kickAmp) * degToRad(30);

    // Head bobs rapidly (frog throat sac effect)
    const headBobSpeed = 12;
    char.head.position.y += Math.sin(t * headBobSpeed) * 0.02;
}

function animateTrump(char, t) {
    // Trump does his signature pointing gesture while bobbing side to side
    const pointFreq = 2;
    char.leftArm.rotation.z = degToRad(60); // Always raised for pointing
    char.rightArm.rotation.x = Math.sin(t * pointFreq) * degToRad(45);

    // Head shakes "no" rhythmically (like scolding the music)
    char.head.rotation.y = Math.sin(t * 1.2) * degToRad(30);
    char.head.rotation.z = Math.cos(t * 0.9) * degToRad(5);

    // Legs shift weight back and forth (debate podium pacing)
    const paceFreq = 1.8;
    char.leftLeg.rotation.x = Math.sin(t * paceFreq) * degToRad(15);
    char.rightLeg.rotation.x = -Math.sin(t * paceFreq) * degToRad(15);
}

function animateElon(char, t) {
    // Elon floats slightly (zero-G vibe) with robotic arm movements
    const floatFreq = 1.5;
    char.group.position.y += Math.sin(t * floatFreq) * 0.08;

    // Arms move like conducting rocket launches
    char.leftArm.rotation.z = degToRad(45) + Math.sin(t * 2.2) * degToRad(90);
    char.rightArm.rotation.z = degToRad(-45) - Math.sin(t * 2.2) * degToRad(90);

    // Legs stay stiff like astronaut boots in low gravity
    char.leftLeg.rotation.x = degToRad(5);
    char.rightLeg.rotation.x = -degToRad(5);
}

// Handle window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
