<body>

    function stage(){
      const floor=new THREE.Mesh(new THREE.CylinderGeometry(8.8,8.8,.26,96),new THREE.MeshStandardMaterial({color:0x0b111b,roughness:.45,metalness:.48}));floor.position.y=-.2;floor.receiveShadow=true;scene.add(floor);
      const inset=new THREE.Mesh(new THREE.CylinderGeometry(7.85,7.85,.035,96),new THREE.MeshStandardMaterial({color:0x111b27,roughness:.29,metalness:.58}));inset.position.y=-.04;inset.receiveShadow=true;scene.add(inset);
      for(let i=0;i<16;i++){const a=i*Math.PI/8;const light=new THREE.Mesh(new THREE.BoxGeometry(.12,.04,1.15),new THREE.MeshBasicMaterial({color:i%2?0x784d31:0xd3a161}));light.position.set(Math.cos(a)*6.8,-.005,Math.sin(a)*6.8);light.rotation.y=-a;scene.add(light);}
      const back=new THREE.Mesh(new THREE.CircleGeometry(14,64),new THREE.MeshBasicMaterial({color:0x070b16,side:THREE.DoubleSide}));back.position.set(0,5,-5.8);back.rotation.x=0;scene.add(back);
      const arch=cylinder(6.8,6.8,.08,new THREE.MeshBasicMaterial({color:0x25324a}),new THREE.Group(),64);arch.rotation.x=Math.PI/2;arch.position.set(0,4.8,-5.55);scene.add(arch);
      for(let i=0;i<7;i++){const spot=new THREE.Mesh(new THREE.SphereGeometry(.035,8,8),new THREE.MeshBasicMaterial({color:0xd4a26d}));spot.position.set(-5.2+i*1.73,4.1+Math.sin(i)*.3,-5.4);scene.add(spot);}

    const particleGeo=new THREE.BufferGeometry(), particleCount=400, particlePos=new Float32Array(particleCount*3);for(let i=0;i<particleCount;i++){particlePos[i*3]=(Math.random()-.5)*18;particlePos[i*3+1]=Math.random()*7;particlePos[i*3+2]=(Math.random()-.5)*10-2;}particleGeo.setAttribute('position',new THREE.BufferAttribute(particlePos,3));const particles=new THREE.Points(particleGeo,new THREE.PointsMaterial({color:0xc5a77b,size:.035,transparent:true,opacity:.47}));scene.add(particles);

    }
    function resize(){const w=innerWidth,h=innerHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}addEventListener('resize',resize);resize();
