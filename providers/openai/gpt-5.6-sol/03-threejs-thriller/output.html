<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thriller — Midnight Ensemble</title>
<style>
  *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#030407;color:#efe8dc;font-family:Arial,Helvetica,sans-serif}canvas{display:block}
  #ui{position:fixed;inset:0;pointer-events:none;padding:clamp(18px,3vw,46px);display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(#0007,transparent 20%,transparent 76%,#000a)}
  .eyebrow{font-size:9px;letter-spacing:.5em;text-transform:uppercase;color:#e06157}.title{margin-top:9px;font-family:Georgia,serif;font-size:clamp(30px,5vw,72px);line-height:.82;letter-spacing:-.055em;text-shadow:0 0 40px #d6473670}.title i{font-weight:400;color:#c53c34}.sub{margin-top:13px;font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:#d8cab399}
  .bottom{display:flex;justify-content:space-between;align-items:end}.cast{display:flex;gap:6px;flex-wrap:wrap;max-width:65%}.chip{border:1px solid #ffffff24;border-radius:99px;padding:7px 10px;background:#06080aa3;backdrop-filter:blur(7px);font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:#ddd1c2}.chip:first-child{border-color:#c84d45aa;color:#ffaaa2}
  .controls{text-align:right;font:9px/1.7 ui-monospace,monospace;letter-spacing:.12em;color:#ffffff70;text-transform:uppercase}.pulse{display:inline-block;width:5px;height:5px;margin-right:7px;border-radius:50%;background:#e55347;box-shadow:0 0 12px #ff5549;animation:pulse 1s infinite alternate}@keyframes pulse{to{opacity:.35}}
  .bars:before,.bars:after{content:"";position:fixed;left:0;right:0;height:clamp(8px,1.5vw,20px);background:#000;z-index:3}.bars:before{top:0}.bars:after{bottom:0}
  #loader{position:fixed;inset:0;display:grid;place-items:center;background:#030407;z-index:5;transition:opacity .8s}.loadmark{font:italic 42px Georgia,serif;color:#c9473f;text-shadow:0 0 30px #d54b45}.loaded #loader{opacity:0;pointer-events:none}.paused .pulse{background:#aaa;animation:none}.paused .controls:after{content:" · paused";color:#e76860}
  #fallback{position:fixed;inset:0;display:none;place-items:center;padding:30px;text-align:center;background:#090a0d;z-index:9}
  @media(max-width:600px){.cast{display:none}.sub{display:none}.controls{font-size:8px}}
</style>
</head>
<body class="bars">
<div id="loader"><div class="loadmark">Thriller</div></div><div id="fallback">This scene needs WebGL. Please open it in a modern browser with hardware acceleration enabled.</div>
<div id="ui">
  <header><div class="eyebrow">A midnight ensemble</div><div class="title"><i>Thriller</i> / After Dark</div><div class="sub">Four icons · one impossible moonlit performance</div></header>
  <footer class="bottom"><div class="cast"><span class="chip">Michael Jackson</span><span class="chip">Pepe the Frog</span><span class="chip">Donald Trump</span><span class="chip">Elon Musk</span></div><div class="controls"><span class="pulse"></span>playing live<br>click: pause · drag: orbit</div></footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
(() => {
  'use strict';
  if(!window.THREE){document.querySelector('#fallback').style.display='grid';document.querySelector('#loader').style.display='none';return}
  const T=THREE, scene=new T.Scene(), clock=new T.Clock(),TAU=Math.PI*2;let paused=false,time=0,pointerDown=false,px=0,py=0,userYaw=0,userPitch=0;
  scene.background=new T.Color(0x030509);scene.fog=new T.FogExp2(0x071019,.035);
  const renderer=new T.WebGLRenderer({antialias:true,powerPreference:'high-performance'});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;renderer.shadowMap.type=T.PCFSoftShadowMap;renderer.outputColorSpace=T.SRGBColorSpace;renderer.toneMapping=T.ACESFilmicToneMapping;renderer.toneMappingExposure=1.12;document.body.prepend(renderer.domElement);
  const camera=new T.PerspectiveCamera(38,innerWidth/innerHeight,.1,100);camera.position.set(0,4.3,14);
  const world=new T.Group();scene.add(world);
  const mat=(color,rough=.65,metal=0)=>new T.MeshStandardMaterial({color,roughness:rough,metalness:metal});
  const skin={mj:mat(0xb77a61,.82),trump:mat(0xd8966f,.8),elon:mat(0xc89478,.8),pepe:mat(0x66a34d,.82)};
  const black=mat(0x08090b,.4,.2),red=mat(0x821b1d,.38,.25),redBright=mat(0xc33731,.35,.22),white=mat(0xe8e0d1,.72),gold=mat(0xd5a84d,.35,.65),blue=mat(0x235183,.7),navy=mat(0x121b29,.55,.1),green=mat(0x579747,.8),orange=mat(0xd8692e,.55),silver=mat(0x98a4aa,.25,.8);
  function mesh(g,m,cast=true,receive=false){const o=new T.Mesh(g,m);o.castShadow=cast;o.receiveShadow=receive;return o}
  function sphere(r,m,sx=1,sy=1,sz=1){const o=mesh(new T.SphereGeometry(r,32,20),m);o.scale.set(sx,sy,sz);return o}
  function box(x,y,z,m){return mesh(new T.BoxGeometry(x,y,z,2,2,2),m)}
  function cyl(r1,r2,h,m,radial=20){return mesh(new T.CylinderGeometry(r1,r2,h,radial),m)}
  function addAt(parent,obj,x=0,y=0,z=0){obj.position.set(x,y,z);parent.add(obj);return obj}
  function limb(parent,x,y,z,upperMat,lowerMat,len1=.72,len2=.65,r=.12){
    const joint=new T.Group();joint.position.set(x,y,z);parent.add(joint);const upper=addAt(joint,cyl(r,r*.88,len1,upperMat),0,-len1/2,0);const elbow=new T.Group();elbow.position.y=-len1;joint.add(elbow);addAt(elbow,cyl(r*.9,r*.72,len2,lowerMat),0,-len2/2,0);const hand=addAt(elbow,sphere(r*1.22,skin.mj,.9,1.1,.75),0,-len2-r*.3,0);return{joint,elbow,hand,upper};
  }
  function leg(parent,x,y,z,pants,shoe){const hip=new T.Group();hip.position.set(x,y,z);parent.add(hip);addAt(hip,cyl(.15,.125,.86,pants),0,-.43,0);const knee=new T.Group();knee.position.y=-.86;hip.add(knee);addAt(knee,cyl(.125,.105,.78,pants),0,-.39,0);const foot=addAt(knee,box(.26,.17,.48,shoe),0,-.82,.1);return{hip,knee,foot}}
  function eye(parent,x,y,z,scale=1){const e=addAt(parent,sphere(.105*scale,white,1,1.15,.45),x,y,z);addAt(e,sphere(.043*scale,black,1,1,.5),0,0,.09*scale);return e}
  function label(text,color){const c=document.createElement('canvas');c.width=512;c.height=80;const g=c.getContext('2d');g.clearRect(0,0,512,80);g.font='700 30px Arial';g.textAlign='center';g.letterSpacing='4px';g.fillStyle=color;g.shadowColor=color;g.shadowBlur=14;g.fillText(text.toUpperCase(),256,49);const tex=new T.CanvasTexture(c);tex.colorSpace=T.SRGBColorSpace;const s=new T.Sprite(new T.SpriteMaterial({map:tex,transparent:true,depthWrite:false}));s.scale.set(2.65,.44,1);return s}

  function createActor(kind,x,z,scale=1){
    const root=new T.Group();root.position.set(x,0,z);root.scale.setScalar(scale);world.add(root);const body=new T.Group();body.position.y=2.08;root.add(body);let jacket=kind==='mj'?redBright:kind==='pepe'?blue:kind==='trump'?navy:black;let pants=kind==='pepe'?mat(0x493525,.8):kind==='trump'?navy:black;
    const torso=addAt(body,box(kind==='pepe'?1.0:.88,1.35,.48,jacket),0,.7,0);torso.geometry.translate(0,0,0);if(kind==='mj'){addAt(torso,box(.07,1.22,.51,gold),0,0,.01);addAt(torso,box(.7,.08,.535,gold),0,.32,.01);for(const sx of [-1,1]){const ep=addAt(torso,box(.3,.1,.62,red),sx*.49,.52,0);ep.rotation.z=sx*.12}}
    if(kind==='trump'){addAt(torso,box(.12,1.05,.54,white),0,0,.01);const tie=addAt(torso,box(.11,.7,.57,redBright),0,-.05,.02);tie.rotation.z=.02;addAt(torso,box(.22,.07,.57,white),.29,.18,.02)}
    if(kind==='elon'){addAt(torso,box(.55,.06,.54,silver),0,.2,.02);addAt(torso,box(.08,.9,.54,silver),0,0,.02)}
    const neck=addAt(body,cyl(.15,.17,.22,kind==='pepe'?green:skin[kind]),0,1.46,0);const headGroup=new T.Group();headGroup.position.set(0,1.78,0);body.add(headGroup);
    if(kind==='pepe'){
      addAt(headGroup,sphere(.48,green,1.18,.9,.72),0,0,0);addAt(headGroup,sphere(.23,green,.95,1.05,.8),-.28,.27,.01);addAt(headGroup,sphere(.23,green,.95,1.05,.8),.28,.27,.01);eye(headGroup,-.28,.29,.34,1.4);eye(headGroup,.28,.29,.34,1.4);const mouth=addAt(headGroup,mesh(new T.TorusGeometry(.24,.045,12,32,Math.PI),mat(0x5b302a,.9)),0,-.12,.4);mouth.rotation.z=Math.PI;mouth.scale.y=.55;
    }else{
      addAt(headGroup,sphere(.35,skin[kind],.84,1.13,.86),0,0,0);eye(headGroup,-.105,.04,.285,.68);eye(headGroup,.105,.04,.285,.68);addAt(headGroup,sphere(.045,skin[kind],.75,1.4,1),0,-.055,.337);const mouth=addAt(headGroup,mesh(new T.TorusGeometry(.09,.018,8,20,Math.PI),kind==='mj'?mat(0x5c2024):mat(0x7d4c43)),0,-.17,.31);mouth.rotation.z=Math.PI;
      if(kind==='mj'){for(let i=0;i<18;i++){const a=i/18*Math.PI*2,r=.29+(i%3)*.035;addAt(headGroup,sphere(.105,black),Math.cos(a)*r,.19+Math.sin(a)*.22,-.03+Math.sin(a)*.04)}addAt(headGroup,sphere(.14,black,1.2,.8,.7),.24,.08,-.12)}
      if(kind==='trump'){const hair=mat(0xe0bd58,.72);for(let i=0;i<9;i++){const h=addAt(headGroup,box(.16,.08,.43,hair),-.29+i*.073,.29+Math.sin(i*.6)*.035,-.015);h.rotation.z=-.22+i*.025}addAt(headGroup,sphere(.16,hair,1.8,.45,1.1),-.05,.28,-.12)}
      if(kind==='elon'){const hair=mat(0x2b201c,.9);for(let i=0;i<9;i++){const a=i/9*Math.PI;addAt(headGroup,sphere(.13,hair),Math.cos(a)*.25,.25+Math.sin(a)*.1,-.1)}}
    }
    const armMat=kind==='pepe'?green:jacket,handMat=kind==='pepe'?green:skin[kind];const left=limb(body,-.56,1.23,0,armMat,armMat),right=limb(body,.56,1.23,0,armMat,armMat);left.hand.material=handMat;right.hand.material=handMat;
    const leftLeg=leg(root,-.22,2.05,0,pants,kind==='mj'?white:black),rightLeg=leg(root,.22,2.05,0,pants,kind==='mj'?white:black);
    const name=kind==='mj'?'Michael Jackson':kind==='pepe'?'Pepe the Frog':kind==='trump'?'Donald Trump':'Elon Musk';const tag=label(name,kind==='mj'?'#ef5a4e':'#b8c9bb');tag.position.set(0,.16,.3);root.add(tag);
    return{kind,root,body,head:headGroup,left,right,leftLeg,rightLeg,baseX:x,baseZ:z,phase:{mj:0,pepe:.12,trump:.25,elon:.38}[kind]};
  }
  const actors=[createActor('pepe',-3.75,.35,.91),createActor('mj',-1.25,0,1.05),createActor('trump',1.25,.15,1),createActor('elon',3.7,.35,1.02)];

  function groundTexture(){const c=document.createElement('canvas');c.width=c.height=512;const g=c.getContext('2d');g.fillStyle='#151817';g.fillRect(0,0,512,512);for(let i=0;i<900;i++){const v=Math.floor(18+Math.random()*28);g.fillStyle=`rgb(${v},${v+4},${v+1})`;g.fillRect(Math.random()*512,Math.random()*512,Math.random()*3+1,Math.random()*18+2)}g.strokeStyle='#30302b';g.lineWidth=2;for(let i=0;i<8;i++){g.beginPath();g.moveTo(Math.random()*512,0);g.lineTo(Math.random()*512,512);g.stroke()}const t=new T.CanvasTexture(c);t.wrapS=t.wrapT=T.RepeatWrapping;t.repeat.set(9,9);t.anisotropy=renderer.capabilities.getMaxAnisotropy();return t}
  const ground=mesh(new T.CircleGeometry(30,80),new T.MeshStandardMaterial({map:groundTexture(),color:0x303a34,roughness:.9,metalness:.05}),false,true);ground.rotation.x=-Math.PI/2;world.add(ground);
  const stageRing=mesh(new T.RingGeometry(4.8,5.0,80),new T.MeshBasicMaterial({color:0x7d1b20,transparent:true,opacity:.65,side:T.DoubleSide}),false);stageRing.rotation.x=-Math.PI/2;stageRing.position.y=.015;world.add(stageRing);

  function tombstone(x,z,s=1){const g=new T.Group(),stone=mat(0x31383b,.96);addAt(g,box(.72*s,.85*s,.23*s,stone),0,.43*s,0);addAt(g,sphere(.36*s,stone,1,1,.35),0,.83*s,0);const cross=mat(0x242b2d);addAt(g,box(.08*s,.44*s,.26*s,cross),0,.66*s,.02);addAt(g,box(.31*s,.08*s,.26*s,cross),0,.72*s,.02);g.position.set(x,0,z);g.rotation.y=(Math.random()-.5)*.35;world.add(g)}
  for(let i=0;i<24;i++){const side=i%2?-1:1,x=side*(5.5+Math.random()*8),z=-2-Math.random()*13;tombstone(x,z,.65+Math.random()*.8)}
  for(let i=0;i<11;i++){const trunk=addAt(world,cyl(.08,.18,2.5,mat(0x191714)),(i%2?-1:1)*(6+Math.random()*9),1.15,-4-Math.random()*14);trunk.rotation.z=(Math.random()-.5)*.28;for(let b=0;b<3;b++){const branch=addAt(trunk,cyl(.035,.075,1.25,mat(0x191714)),0,.3+b*.45,0);branch.rotation.z=(b%2?1:-1)*(.75+Math.random()*.4);branch.position.x=(b%2?1:-1)*.35}}
  const moonMat=new T.MeshBasicMaterial({color:0xffe7c3,fog:false});const moon=mesh(new T.CircleGeometry(3.15,80),moonMat,false);moon.position.set(-5.5,8.4,-15);scene.add(moon);const halo=mesh(new T.RingGeometry(3.25,4.4,80),new T.MeshBasicMaterial({color:0xd8c5b0,transparent:true,opacity:.09,side:T.DoubleSide,fog:false}),false);halo.position.copy(moon.position);scene.add(halo);
  const starsGeo=new T.BufferGeometry(),starPos=[];for(let i=0;i<600;i++)starPos.push((Math.random()-.5)*55,3+Math.random()*22,-10-Math.random()*25);starsGeo.setAttribute('position',new T.Float32BufferAttribute(starPos,3));const stars=new T.Points(starsGeo,new T.PointsMaterial({color:0xa9c2ce,size:.035,transparent:true,opacity:.65,fog:false}));scene.add(stars);
  const mistGeo=new T.BufferGeometry(),mistPos=[];for(let i=0;i<280;i++)mistPos.push((Math.random()-.5)*24,Math.random()*2.2,-2-Math.random()*14);mistGeo.setAttribute('position',new T.Float32BufferAttribute(mistPos,3));const mist=new T.Points(mistGeo,new T.PointsMaterial({color:0xa8c4b5,size:.12,transparent:true,opacity:.16,depthWrite:false}));scene.add(mist);

  scene.add(new T.HemisphereLight(0x7997bd,0x21120f,1.5));const key=new T.SpotLight(0xff7162,520,32,.52,.7,1.4);key.position.set(-6,9,7);key.target.position.set(-1,2,0);key.castShadow=true;key.shadow.mapSize.set(2048,2048);key.shadow.bias=-.0002;scene.add(key,key.target);const rim=new T.SpotLight(0x5fa9ff,650,35,.48,.8,1.2);rim.position.set(7,8,-5);rim.target.position.set(1,2,0);rim.castShadow=true;rim.shadow.mapSize.set(1024,1024);scene.add(rim,rim.target);const moonLight=new T.DirectionalLight(0xadc9e8,1.9);moonLight.position.set(-5,10,-8);scene.add(moonLight);const foot=new T.PointLight(0xd52c32,120,10,2);foot.position.set(0,.3,3);scene.add(foot);
  function cone(light,color){const c=mesh(new T.ConeGeometry(2.7,10,32,1,true),new T.MeshBasicMaterial({color,transparent:true,opacity:.025,side:T.DoubleSide,depthWrite:false}),false);c.position.copy(light.position);c.rotation.x=Math.PI;scene.add(c);return c}cone(key,0xff5548);

  function pose(a,t,index){
    const b=t*2.25+a.phase*TAU,cycle=((b%16)+16)%16,s=Math.sin(b*TAU),half=Math.sin(b*Math.PI),beat=Math.sin(b*Math.PI*2);
    const L=a.left,R=a.right,LL=a.leftLeg,RL=a.rightLeg;a.root.position.set(a.baseX,.06+Math.abs(beat)*.045,a.baseZ);a.root.rotation.set(0,0,0);a.body.rotation.set(0,0,Math.sin(b*.5)*.035);a.head.rotation.set(0,Math.sin(b*.55)*.12,0);
    L.joint.rotation.set(.08,0,.08);R.joint.rotation.set(.08,0,-.08);L.elbow.rotation.set(0,0,0);R.elbow.rotation.set(0,0,0);LL.hip.rotation.set(0,0,.03);RL.hip.rotation.set(0,0,-.03);LL.knee.rotation.set(0,0,0);RL.knee.rotation.set(0,0,0);
    if(cycle<4){const q=Math.sin(cycle/4*Math.PI);L.joint.rotation.x=-1.15-q*.25;R.joint.rotation.x=-1.15-q*.25;L.joint.rotation.z=-.35+beat*.08;R.joint.rotation.z=.35-beat*.08;L.elbow.rotation.x=-.32-.2*q;R.elbow.rotation.x=-.32-.2*q;a.body.rotation.x=.12+.08*q;a.root.position.x=a.baseX+Math.sin(b*Math.PI)*.15}
    else if(cycle<8){const q=cycle-4,side=Math.sin(q*Math.PI/2);a.root.position.x=a.baseX+side*.33;a.root.rotation.y=side*.13;L.joint.rotation.z=-1.25+beat*.25;R.joint.rotation.z=1.25-beat*.25;L.elbow.rotation.z=-.55;R.elbow.rotation.z=.55;LL.hip.rotation.z=.2*side;RL.hip.rotation.z=-.2*side;a.body.rotation.z=-side*.11}
    else if(cycle<12){const q=cycle-8,kick=Math.max(0,Math.sin(q*Math.PI/2));a.root.rotation.y=Math.sin(q*Math.PI/2)*.2;R.joint.rotation.x=-1.45;L.joint.rotation.x=-.65;R.joint.rotation.z=.35;L.joint.rotation.z=-.8;RL.hip.rotation.x=-kick*.92;RL.knee.rotation.x=kick*.65;a.body.rotation.x=-.08}
    else{const q=(cycle-12)/4,rise=Math.sin(q*Math.PI);L.joint.rotation.z=-.25-rise*2.15;R.joint.rotation.z=.25+rise*2.15;L.elbow.rotation.z=-.35-rise*.4;R.elbow.rotation.z=.35+rise*.4;a.root.rotation.y=Math.sin(q*Math.PI*2)*.18;a.body.rotation.z=Math.sin(q*Math.PI*2)*.08}
    if(a.kind==='pepe')a.head.scale.setScalar(1+Math.abs(beat)*.025);if(a.kind==='trump')a.head.rotation.y+=.05;if(a.kind==='elon')a.body.rotation.y=Math.sin(b*.3)*.04;
  }
  function animate(now){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),.05);if(!paused)time+=dt;actors.forEach((a,i)=>pose(a,time,i));const pos=mist.geometry.attributes.position;for(let i=0;i<pos.count;i++){let x=pos.getX(i)+dt*(.12+(i%7)*.015);if(x>12)x=-12;pos.setX(i,x)}pos.needsUpdate=true;stars.rotation.y=time*.0015;stageRing.material.opacity=.35+Math.sin(time*4.5)*.25;foot.intensity=105+Math.sin(time*4.5)*30;
    const autoYaw=Math.sin(time*.16)*.12,autoLift=Math.sin(time*.24)*.22,rad=14.2;const yaw=autoYaw+userYaw;camera.position.set(Math.sin(yaw)*rad,4.25+autoLift+userPitch,Math.cos(yaw)*rad);camera.lookAt(0,2.45,0);renderer.render(scene,camera)}
  renderer.domElement.addEventListener('pointerdown',e=>{pointerDown=true;px=e.clientX;py=e.clientY;renderer.domElement.setPointerCapture(e.pointerId)});renderer.domElement.addEventListener('pointermove',e=>{if(!pointerDown)return;userYaw=clamp(userYaw+(e.clientX-px)*.004,-.75,.75);userPitch=clamp(userPitch-(e.clientY-py)*.006,-1.3,1.8);px=e.clientX;py=e.clientY});renderer.domElement.addEventListener('pointerup',()=>pointerDown=false);renderer.domElement.addEventListener('click',e=>{if(Math.abs(e.clientX-px)+Math.abs(e.clientY-py)<5){paused=!paused;document.body.classList.toggle('paused',paused)}});
  addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();paused=!paused;document.body.classList.toggle('paused',paused)}});addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
  setTimeout(()=>document.body.classList.add('loaded'),450);animate();
})();
</script>
</body>
</html>
