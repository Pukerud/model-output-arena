<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thriller Quartet — Three.js Cinematic</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#02030a;color:#fff;font-family:ui-sans-serif,system-ui,Segoe UI,Arial}#stage{position:fixed;inset:0}.ui{position:fixed;left:18px;top:16px;z-index:5;max-width:420px;padding:14px 16px;border:1px solid rgba(255,255,255,.15);border-radius:18px;background:linear-gradient(135deg,rgba(10,12,22,.72),rgba(44,15,36,.45));backdrop-filter:blur(10px);box-shadow:0 18px 70px #000}.ui h1{font-size:18px;margin:0 0 4px;letter-spacing:.02em}.ui p{margin:0;color:#b7c2d7;font-size:13px;line-height:1.4}.ui b{color:#ff5577}.badge{position:fixed;right:16px;bottom:14px;color:#b7c2d7;font-size:12px;background:rgba(0,0,0,.36);padding:8px 11px;border-radius:999px;border:1px solid rgba(255,255,255,.12)}button{margin-top:10px;border:1px solid rgba(255,255,255,.18);border-radius:12px;background:#151b2d;color:white;padding:8px 12px;font-weight:800;cursor:pointer}button:hover{background:#242d48}</style>
</head>
<body>
<div id="stage"></div>
<div class="ui"><h1>Thriller Quartet</h1><p>Stylized Michael Jackson, Pepe the Frog, Donald Trump, and Elon Musk perform synchronized <b>Thriller</b> choreography in a cinematic moonlit graveyard. Drag to orbit, scroll to dolly.</p><button id="toggle">Pause choreography</button></div>
<div class="badge">Three.js · procedural characters · volumetric-style lighting</div>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
(() => {
const container=document.getElementById('stage');
const scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0x070914,.035);
const camera=new THREE.PerspectiveCamera(48,innerWidth/innerHeight,.1,240);camera.position.set(0,7.2,17);
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(2,devicePixelRatio));renderer.outputColorSpace=THREE.SRGBColorSpace;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.08;renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;container.appendChild(renderer.domElement);
const clock=new THREE.Clock();let paused=false, yaw=0, pitch=.1, dist=17, target=new THREE.Vector3(0,2,0);
const mat=(c,rough=.7,metal=0)=>new THREE.MeshStandardMaterial({color:c,roughness:rough,metalness:metal});
const mats={black:mat(0x050505,.55),white:mat(0xf7f6f2,.45),red:mat(0xb60f26,.5),silver:mat(0xbfc7d2,.25,.35),skin:mat(0xd79a66,.62),orange:mat(0xf07b22,.5),blue:mat(0x1c3764,.58),green:mat(0x49b04a,.7),frog:mat(0x6ccd4f,.8),gold:mat(0xffce57,.42,.25),gray:mat(0x68707b,.65),purple:mat(0x3a143f,.65),hair:mat(0x17110d,.8),darkSuit:mat(0x0c111d,.5),tesla:mat(0x202838,.45),zombie:mat(0x72806a,.75)};
function mesh(g,m,parent=scene,cast=true,receive=false){const o=new THREE.Mesh(g,m);o.castShadow=cast;o.receiveShadow=receive;parent.add(o);return o}
function group(parent=scene){const g=new THREE.Group();parent.add(g);return g}
function sphere(r,m,p=scene){return mesh(new THREE.SphereGeometry(r,32,18),m,p)}function box(x,y,z,m,p=scene){return mesh(new THREE.BoxGeometry(x,y,z),m,p)}function cyl(r1,r2,h,m,p=scene,seg=32){return mesh(new THREE.CylinderGeometry(r1,r2,h,seg),m,p)}
// cinematic world
const floor=mesh(new THREE.PlaneGeometry(170,170),new THREE.MeshStandardMaterial({color:0x11151c,roughness:.86}),scene,false,true);floor.rotation.x=-Math.PI/2;
const moon=sphere(3.2,new THREE.MeshBasicMaterial({color:0xfff1c1}),scene,false);moon.position.set(-18,18,-24);const moonHalo=sphere(5.8,new THREE.MeshBasicMaterial({color:0x7d8cff,transparent:true,opacity:.12,depthWrite:false}),scene,false);moonHalo.position.copy(moon.position);
scene.add(new THREE.AmbientLight(0x3d4d7c,.38));const key=new THREE.DirectionalLight(0xbfd0ff,2.6);key.position.set(-8,16,9);key.castShadow=true;key.shadow.mapSize.set(2048,2048);key.shadow.camera.near=.1;key.shadow.camera.far=60;key.shadow.camera.left=-22;key.shadow.camera.right=22;key.shadow.camera.top=22;key.shadow.camera.bottom=-22;scene.add(key);
[['red',0xff224f,-9,6,7],['cyan',0x43d7ff,9,6,7],['gold',0xffbd5b,0,7,-8]].forEach(s=>{const l=new THREE.SpotLight(s[1],5,45,.52,.7,.9);l.position.set(s[2],s[3],s[4]);l.target.position.set(0,1,0);l.castShadow=true;scene.add(l,l.target);});
const back=box(44,10,.5,new THREE.MeshStandardMaterial({color:0x111428,roughness:.8}),scene,false,true);back.position.set(0,5,-15);for(let i=0;i<28;i++){const p=box(.08,Math.random()*5+2,.08,mat(0x1f2738),scene,false);p.position.set(-21+i*1.6,Math.random()*2+2,-14.65)}
for(let i=0;i<38;i++){const grave=group();const w=.55+Math.random()*.35,h=.8+Math.random()*.7;const g=box(w,h,.16,mat(0x454b55,.9),grave,true,true);g.position.y=h/2;const cap=cyl(w*.5,w*.5,.17,mat(0x4f5662,.9),grave,24);cap.scale.z=.28;cap.rotation.x=Math.PI/2;cap.position.y=h;grave.position.set((Math.random()-.5)*54,0,-8-Math.random()*38);grave.rotation.y=(Math.random()-.5)*.4;}
for(let i=0;i<120;i++){const s=sphere(.018+Math.random()*.025,new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.5+Math.random()*.5}),scene,false);s.position.set((Math.random()-.5)*90,Math.random()*36+8,-20-Math.random()*70)}
// smoky light cones
for(let i=0;i<8;i++){const cone=cyl(.18,2.9,8,new THREE.MeshBasicMaterial({color:i%2?0x4bdcff:0xff3562,transparent:true,opacity:.055,depthWrite:false,side:THREE.DoubleSide}),scene,false);cone.position.set(-9+i*2.6,4,-5-Math.random()*7);cone.rotation.x=(Math.random()-.5)*.4;}
function label(text,parent,y=2.9){const can=document.createElement('canvas');can.width=512;can.height=128;const c=can.getContext('2d');c.fillStyle='rgba(0,0,0,.5)';c.roundRect?.(28,26,456,70,24);c.fill();c.font='800 42px system-ui';c.textAlign='center';c.fillStyle='white';c.shadowColor='black';c.shadowBlur=8;c.fillText(text,256,75);const tex=new THREE.CanvasTexture(can);tex.colorSpace=THREE.SRGBColorSpace;const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false}));sp.scale.set(2.4,.6,1);sp.position.set(0,y,0);parent.add(sp);return sp}
function limb(parent,name,len,thick,color){const g=group(parent);const upper=cyl(thick,thick*.9,len,color,g);upper.position.y=-len/2;const hand=sphere(thick*1.25,color,g);hand.position.y=-len;g[name]=upper;g.hand=hand;return g}
function humanoid(opts){const root=group();root.position.copy(opts.pos);root.userData.kind=opts.kind;const body=group(root);root.body=body;const torso=box(opts.w||.82,1.22,.42,opts.jacket||mats.darkSuit,body);torso.position.y=1.78;const hips=box(.82,.38,.42,opts.pants||mats.black,body);hips.position.y=1.03;const neck=cyl(.16,.18,.22,opts.skin||mats.skin,body);neck.position.y=2.45;const head=sphere(opts.headR||.42,opts.skin||mats.skin,body);head.position.y=2.86;head.scale.set(opts.headScaleX||1,opts.headScaleY||1,opts.headScaleZ||1);root.head=head;
const hair=sphere((opts.headR||.42)*1.04,opts.hair||mats.hair,body);hair.position.copy(head.position).add(new THREE.Vector3(0,.12,-.03));hair.scale.set(opts.hairScaleX||1,opts.hairScaleY||.45,opts.hairScaleZ||1);root.hair=hair;
const eyeM=mat(0x05080b,.3);[-.14,.14].forEach(x=>{const e=sphere(.045,eyeM,body);e.position.set(x,2.9,.39);});
const mouth=box(.2,.025,.02,mat(0x2a0608),body);mouth.position.set(0,2.72,.42);
root.lArm=limb(body,'upper',.9,.085,opts.sleeveL||opts.jacket||mats.darkSuit);root.rArm=limb(body,'upper',.9,.085,opts.sleeveR||opts.jacket||mats.darkSuit);root.lArm.position.set(-.55,2.22,0);root.rArm.position.set(.55,2.22,0);root.lArm.rotation.z=.25;root.rArm.rotation.z=-.25;
root.lLeg=limb(body,'upper',1.05,.11,opts.pants||mats.black);root.rLeg=limb(body,'upper',1.05,.11,opts.pants||mats.black);root.lLeg.position.set(-.24,.88,0);root.rLeg.position.set(.24,.88,0);const lf=box(.34,.12,.62,opts.shoeL||mats.black,body);const rf=box(.34,.12,.62,opts.shoeR||mats.black,body);lf.position.set(-.24,-.23,.18);rf.position.set(.24,-.23,.18);root.lFoot=lf;root.rFoot=rf;
if(opts.hat){const brim=cyl(.54,.54,.08,opts.hat,body);brim.position.y=3.25;const top=cyl(.34,.38,.33,opts.hat,body);top.position.y=3.45;root.hat=top}
if(opts.tie){const tie=mesh(new THREE.ConeGeometry(.12,.52,4),opts.tie,body);tie.position.set(0,1.85,.235);tie.rotation.z=Math.PI/4}
label(opts.label,root,3.95);return root}
function frog(opts){const root=group();root.position.copy(opts.pos);root.userData.kind='pepe';const body=sphere(.58,mats.frog,root);body.scale.set(.9,1.1,.6);body.position.y=1.32;const head=sphere(.62,mats.frog,root);head.scale.set(1.23,.82,.76);head.position.y=2.25;root.body=body;root.head=head;const belly=sphere(.38,mat(0xd9f0a4,.8),root);belly.scale.set(1,.8,.35);belly.position.set(0,1.18,.38);[-.32,.32].forEach(x=>{const e=sphere(.16,mat(0xf6ffdb),root);e.position.set(x,2.43,.45);const p=sphere(.055,mat(0x0b1010),root);p.position.set(x,2.41,.56)});const mouth=box(.55,.035,.025,mat(0x17431e),root);mouth.position.set(0,2.12,.56);root.lArm=limb(root,'upper',.82,.08,mats.frog);root.rArm=limb(root,'upper',.82,.08,mats.frog);root.lArm.position.set(-.62,1.72,0);root.rArm.position.set(.62,1.72,0);root.lLeg=limb(root,'upper',.85,.115,mats.frog);root.rLeg=limb(root,'upper',.85,.115,mats.frog);root.lLeg.position.set(-.27,.76,0);root.rLeg.position.set(.27,.76,0);label('Pepe the Frog',root,3.22);return root}
const michael=humanoid({label:'Michael Jackson',kind:'michael',pos:new THREE.Vector3(-3.6,0,0),skin:mats.skin,jacket:mats.red,pants:mats.black,sleeveR:mats.white,shoeL:mats.white,shoeR:mats.black,hair:mats.hair,hat:mats.black,tie:mats.white,headR:.39});
const pepe=frog({pos:new THREE.Vector3(-1.15,0,.35)});
const trump=humanoid({label:'Donald Trump',kind:'trump',pos:new THREE.Vector3(1.25,0,.25),skin:mat(0xe3a36b),jacket:mats.blue,pants:mats.blue,hair:mat(0xf1c04f),hairScaleY:.32,headScaleX:1.05,tie:mats.red,headR:.43});
const elon=humanoid({label:'Elon Musk',kind:'elon',pos:new THREE.Vector3(3.7,0,0),skin:mat(0xd7a47c),jacket:mats.tesla,pants:mats.black,hair:mat(0x554033),hairScaleY:.38,tie:mats.silver,headR:.41});
const dancers=[michael,pepe,trump,elon];
// back-up zombie ensemble
const zombies=[];for(let i=0;i<12;i++){const z=humanoid({label:'',kind:'zombie',pos:new THREE.Vector3(-8+i*1.45,0,-4.8-Math.sin(i)*.9),skin:mats.zombie,jacket:mat(0x263025),pants:mat(0x20242b),hair:mat(0x22251f),headR:.36});z.scale.setScalar(.78);zombies.push(z)}
function pose(d,t,phase=0,lead=false){const beat=t*2.15+phase;const step=Math.sin(beat), snap=Math.sign(Math.sin(beat*2))*Math.pow(Math.abs(Math.sin(beat*2)),.45);const sway=Math.sin(beat*.5);d.position.y=Math.max(0,Math.sin(beat*2.0))*0.06;d.rotation.y=sway*.18+(lead?Math.sin(t*.55)*.08:0);d.body.rotation.z=sway*.08;d.body.rotation.x=.04*Math.sin(beat*1.5);d.lArm.rotation.x=-1.25+.52*step;d.rArm.rotation.x=-1.25-.52*step;d.lArm.rotation.z=.58+.24*snap;d.rArm.rotation.z=-.58+.24*snap;d.lLeg.rotation.x=.28*step;d.rLeg.rotation.x=-.28*step;d.lLeg.rotation.z=.10*sway;d.rLeg.rotation.z=-.10*sway;if(d.lFoot){d.lFoot.rotation.x=.15*Math.max(0,step);d.rFoot.rotation.x=.15*Math.max(0,-step)}d.head.rotation.y=-d.rotation.y*.45+.12*Math.sin(beat*2);d.head.rotation.x=.08*Math.sin(beat*1.7)}
function thrillerHands(d,t,phase){const b=(Math.sin(t*1.25+phase)+1)/2;d.lArm.rotation.x=-Math.PI/2-.25*Math.sin(t*3+phase);d.rArm.rotation.x=-Math.PI/2+.25*Math.sin(t*3+phase);d.lArm.rotation.z=.35+.25*b;d.rArm.rotation.z=-.35+.25*b;}
function moonwalk(d,t){const local=(t%8);if(local>4.8&&local<7.3){const k=(local-4.8)/2.5;d.position.x=-3.6+Math.sin(k*Math.PI*2)*.18;d.body.rotation.z=-.22;d.lLeg.rotation.x=-.75*Math.sin(k*Math.PI*4);d.rLeg.rotation.x=.75*Math.sin(k*Math.PI*4);d.lArm.rotation.x=-.6;d.rArm.rotation.x=-2.2;}}
function animate(){const dt=clock.getDelta();if(!paused){const t=clock.elapsedTime;dancers.forEach((d,i)=>pose(d,t,i*.48,d===michael));moonwalk(michael,t);if((t%16)>8&&(t%16)<12)dancers.forEach((d,i)=>thrillerHands(d,t,i*.4));zombies.forEach((z,i)=>{pose(z,t,i*.37);thrillerHands(z,t,i*.2);z.position.z=-5.2+Math.sin(t*1.2+i)*.35;z.rotation.y=Math.sin(t*.7+i)*.25});
// camera choreography: slow dolly + tiny handheld drift
const autoYaw=Math.sin(t*.12)*.16;const autoY=6.7+Math.sin(t*.22)*.55;camera.position.x=Math.sin(yaw+autoYaw)*dist;camera.position.z=Math.cos(yaw+autoYaw)*dist;camera.position.y=autoY+pitch*8;camera.lookAt(target.x+Math.sin(t*.4)*.25,target.y,target.z);scene.fog.density=.032+.006*Math.sin(t*.7);}
renderer.render(scene,camera);requestAnimationFrame(animate)}animate();
let dragging=false,lastX=0,lastY=0;renderer.domElement.addEventListener('pointerdown',e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;renderer.domElement.setPointerCapture(e.pointerId)});renderer.domElement.addEventListener('pointermove',e=>{if(!dragging)return;yaw-=(e.clientX-lastX)*.006;pitch=Math.max(-.35,Math.min(.65,pitch+(e.clientY-lastY)*.004));lastX=e.clientX;lastY=e.clientY});addEventListener('pointerup',()=>dragging=false);renderer.domElement.addEventListener('wheel',e=>{dist=Math.max(8,Math.min(32,dist+e.deltaY*.015))},{passive:true});
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(2,devicePixelRatio))});document.getElementById('toggle').onclick=()=>{paused=!paused;document.getElementById('toggle').textContent=paused?'Resume choreography':'Pause choreography'};
})();
</script>
</body>
</html>
